<body style="--accent:#ffadad;--bg1:#200b0b;--bg2:#300e0e;--cardBorder:#661e1e">
  <!-- small fixed -->

  <header class="site" role="banner">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="UpTools Home">
        <img src="/assets/logo/uptools-logo.svg" alt="UpTools logo" width="28" height="28" loading="eager">

      </nav>
    </div>
  </header>
  <main class="wrap">
    <div class="tool-header">
      <div class="tool-icon">Aa</div>
      <h1 style="margin:0">Word Counter</h1>
    </div>
    <div class="card">
      <label class="label" for="txt">Paste or type your text</label>
      <textarea id="txt" class="input" rows="8" placeholder="Paste text here..."></textarea>
      <div id="out" class="result"></div>
    </div>

    <section class="card" style="margin-top:12px">
      <h2 style="margin-top:0">Quick explainer 🎥</h2>
      <iframe width="100%" height="100%"
        src="https://www.youtube-nocookie.com/embed/iiADhChRriM?rel=0&modestbranding=1&playsinline=1"
        title="How to write and format text effectively"
        loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen
        style="border:0; aspect-ratio:16/9; border-radius:.75rem; display:block; width:100%"></iframe>
      <p class="note small" style="margin-top:6px">Video: Why word count matters for SEO, essays, and social media.</p>
    </section>

    <footer class="note small site-footer" role="contentinfo" style="margin-top:12px">
      © <span id="y"></span> UpTools . <a href="/">Home</a> . <a href="/about/">About</a> . <a href="/sitemap.xml">Sitemap</a>
    </footer>
  </main>
  <script type="module">
    const T = document.getElementById('txt'), O = document.getElementById('out');
    document.getElementById('y').textContent = new Date().getFullYear();
    function upd() {
      const s = T.value || '';
      const chars = s.length;
      const words = (s.trim().match(/\S+/g) || []).length;
      const sentences = (s.match(/[.!?]+/g) || []).length;
      const paragraphs = s.trim() ? s.trim().split(/\n\s*\n/).length : 0;
      const lines = s ? s.split(/\r?\n/).length : 0;
      O.innerHTML = `<div class='row'><span>Characters</span><span class='amount'>${chars}</span></div>
        <div class='row'><span>Words</span><span class='amount'>${words}</span></div>
        <div class='row'><span>Sentences</span><span class='amount'>${sentences}</span></div>
        <div class='row'><span>Paragraphs</span><span class='amount'>${paragraphs}</span></div>
        <div class='row'><span>Lines</span><span class='amount'>${lines}</span></div>`;
    }
    T.addEventListener('input', upd);
    upd();
  </script>
