<script>
const W='lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat'.split(' ');
function rw(){return W[Math.floor(Math.random()*W.length)];}
function rs(){let s='';for(let i=0;i<8+Math.floor(Math.random()*12);i++)s+=(i===0?rw()[0].toUpperCase()+rw().slice(1):rw())+' ';return s.trim()+'.';}
function rp(){let p='';for(let i=0;i<4+Math.floor(Math.random()*4);i++)p+=rs()+' ';return p.trim();}
function gen(){const t=document.getElementById('type').value,c=+document.getElementById('cnt').value||5;let r='';for(let i=0;i<c;i++){if(t==='p')r+=rp()+'\n\n';else if(t==='s')r+=rs()+' ';else r+=rw()+' ';}document.getElementById('out').textContent=r.trim();}
gen();
</script>
