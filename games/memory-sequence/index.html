  <main id="main" class="wrap">
  <div class="game-wrap">
    <div class="tool-header"><button class="back-btn" onclick="location.href='/games/'">← Games</button><h1 class="h1">🔵 Memory Sequence</h1><span class="badge">Brain training</span></div>
    <p class="muted">Watch the buttons light up, then repeat the sequence. Each round adds one step.</p>
    <div class="panel center">
      <div class="row" style="justify-content:center">
        <div class="seq-btn" data-i="0" style="width:90px;height:90px;border-radius:16px;background:#3b0d52;cursor:pointer"></div>
        <div class="seq-btn" data-i="1" style="width:90px;height:90px;border-radius:16px;background:#0d3b52;cursor:pointer"></div>
      </div>
      <div class="row" style="justify-content:center;margin-top:10px">
        <div class="seq-btn" data-i="2" style="width:90px;height:90px;border-radius:16px;background:#0d5233;cursor:pointer"></div>
        <div class="seq-btn" data-i="3" style="width:90px;height:90px;border-radius:16px;background:#52400d;cursor:pointer"></div>
      </div>
    </div>
    <div class="stats">
      <div class="stat"><b id="msLevel">0</b><span>Level</span></div>
      <div class="stat"><b id="msBest">0</b><span>Best</span></div>
    </div>
    <div class="row" style="justify-content:center;margin:12px 0"><button class="btn" id="msStart">Start</button></div>
    <p class="muted center" id="msMsg">Press Start to watch the pattern.</p>
  </div>
  <script>
  (()=>{
    const colors=['#a855f7','#22d3ee','#22c55e','#eab308'];
    const lit=['#e9d5ff','#a5f3fc','#bbf7d0','#fde68a'];
    const btns=[...document.querySelectorAll('.seq-btn')];
    let seq=[],input=[],playing=false,level=0,best=0;
    function flash(i,ms){return new Promise(r=>{btns[i].style.background=lit[i];setTimeout(()=>{btns[i].style.background=colors[i];r();},ms);});}
    async function play(){playing=true;input=[];document.getElementById('msMsg').textContent='Watch…';
      for(const i of seq){await flash(i,420);await new Promise(r=>setTimeout(r,180));}
      playing=false;document.getElementById('msMsg').textContent='Your turn — repeat the sequence.';
    }
    function next(){level++;seq.push(Math.floor(Math.random()*4));document.getElementById('msLevel').textContent=level;play();}
    btns.forEach((b,i)=>b.addEventListener('click',()=>{
      if(playing)return;
      if(level===0){document.getElementById('msMsg').textContent='Press Start first.';return;}
      flash(i,160);
      input.push(i);
      const idx=input.length-1;
      if(input[idx]!==seq[idx]){document.getElementById('msMsg').textContent='Wrong! You reached level '+level+'. Press Start to try again.';if(level-1>best){best=level-1;document.getElementById('msBest').textContent=best;}level=0;seq=[];document.getElementById('msLevel').textContent=0;return;}
      if(input.length===seq.length){document.getElementById('msMsg').textContent='Nice! Next round…';setTimeout(next,700);}
    }));
    document.getElementById('msStart').addEventListener('click',()=>{if(level>best){best=level;}document.getElementById('msBest').textContent=best;seq=[];level=0;next();});
  })();
  </script>
