  <script>
    class SimonGame {
      constructor() {
        this.sequence = [];
        this.playerSequence = [];
        this.score = 0;
        this.isPlaying = false;
        this.isShowingSequence = false;

        this.buttons = document.querySelectorAll('.simon-button');
        this.scoreElement = document.getElementById('score');
        this.bestScoreElement = document.getElementById('bestScore');
        this.messageElement = document.getElementById('message');
        this.startBtn = document.getElementById('startBtn');
        this.resetBtn = document.getElementById('resetBtn');

        this.audioCtx = null;
        // Musical tones: C4, E4, G4, C5 (sine waves)
        this.tones = {
          red: 261.63,   // C4
          blue: 329.63,  // E4
          green: 392.00, // G4
          yellow: 523.25 // C5
        };

        this.bestScore = this.loadBestScore();
        this.updateBestScore();

        this.bindEvents();
      }

      loadBestScore() {
        try {
          return parseInt(localStorage.getItem('simon-best-score') || '0', 10);
        } catch(e) {
          return 0;
        }
      }

      saveBestScore() {
        try {
          localStorage.setItem('simon-best-score', String(this.bestScore));
        } catch(e) {}
      }

      updateBestScore() {
        if (this.bestScoreElement) {
          this.bestScoreElement.textContent = this.bestScore;
        }
      }

      bindEvents() {
        this.startBtn.addEventListener('click', () => this.startGame());
        this.resetBtn.addEventListener('click', () => this.resetGame());

        this.buttons.forEach(button => {
          button.addEventListener('click', (e) => {
            if (this.isPlaying && !this.isShowingSequence) {
              this.handlePlayerInput(e.target.dataset.color);
            }
          });

          // Touch feedback: touch-active class on touchstart/touchend
          button.addEventListener('touchstart', () => {
            button.classList.add('touch-active');
            if (!this.isShowingSequence) {
              this.playTone(button.dataset.color);
            }
          }, { passive: true });

          button.addEventListener('touchend', () => {
            button.classList.remove('touch-active');
          }, { passive: true });

          button.addEventListener('touchcancel', () => {
            button.classList.remove('touch-active');
          }, { passive: true });
        });
      }

      playTone(color) {
        try {
          this.audioCtx = this.audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          const osc = this.audioCtx.createOscillator();
          const gainNode = this.audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = this.tones[color] || 440;
          gainNode.gain.setValueAtTime(0.08, this.audioCtx.currentTime);
          gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.3);
          osc.connect(gainNode);
          gainNode.connect(this.audioCtx.destination);
          osc.start();
          osc.stop(this.audioCtx.currentTime + 0.3);
        } catch (e) {
          console.warn(e);
        }
      }

      startGame() {
        const overlay = document.getElementById('gameOverlay');
        if (overlay) overlay.style.display = 'none';

        // Resume AudioContext after user gesture
        if (this.audioCtx && this.audioCtx.state === 'suspended') {
          this.audioCtx.resume();
        }

        this.isPlaying = true;
        this.sequence = [];
        this.playerSequence = [];
        this.score = 0;
        this.updateScore();
        this.nextRound();
      }

      resetGame() {
        const overlay = document.getElementById('gameOverlay');
        if (overlay) overlay.style.display = 'none';

        this.isPlaying = false;
        this.isShowingSequence = false;
        this.sequence = [];
        this.playerSequence = [];
        this.score = 0;
        this.updateScore();
        this.messageElement.textContent = 'Click Start to begin!';
      }

      nextRound() {
        this.playerSequence = [];
        this.addToSequence();
        this.showSequence();
      }

      addToSequence() {
        const colors = ['red', 'blue', 'green', 'yellow'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        this.sequence.push(randomColor);
      }

      async showSequence() {
        this.isShowingSequence = true;
        this.messageElement.textContent = 'Watch the sequence...';

        await this.delay(1000);

        for (let i = 0; i < this.sequence.length; i++) {
          await this.delay(600);
          this.flashButton(this.sequence[i]);
          await this.delay(400);
        }

        this.isShowingSequence = false;
        this.messageElement.textContent = 'Your turn! Repeat the sequence.';
      }

      flashButton(color) {
        const button = document.querySelector(`[data-color="${color}"]`);
        if (!button) return;
        button.classList.add('active');
        this.playTone(color);
        setTimeout(() => {
          button.classList.remove('active');
        }, 300);
      }

      handlePlayerInput(color) {
        this.playerSequence.push(color);
        this.flashButton(color);

        const currentIndex = this.playerSequence.length - 1;

        if (this.playerSequence[currentIndex] !== this.sequence[currentIndex]) {
          this.gameOver();
          return;
        }

        if (this.playerSequence.length === this.sequence.length) {
          this.score++;
          this.updateScore();
          this.messageElement.textContent = 'Correct! Next round...';
          setTimeout(() => this.nextRound(), 1200);
        }
      }

      gameOver() {
        this.isPlaying = false;
        this.messageElement.textContent = `Game Over! Final Score: ${this.score}`;

        // Update best score
        if (this.score > this.bestScore) {
          this.bestScore = this.score;
          this.saveBestScore();
          this.updateBestScore();
        }

        // Play failure sound
        try {
          this.audioCtx = this.audioCtx || new (window.AudioContext || window.webkitAudioContext)();
          const osc = this.audioCtx.createOscillator();
          const gainNode = this.audioCtx.createGain();
          osc.type = 'sawtooth';
          osc.frequency.setValueAtTime(150, this.audioCtx.currentTime);
          osc.frequency.linearRampToValueAtTime(70, this.audioCtx.currentTime + 0.6);
          gainNode.gain.setValueAtTime(0.12, this.audioCtx.currentTime);
          gainNode.gain.linearRampToValueAtTime(0.001, this.audioCtx.currentTime + 0.6);
          osc.connect(gainNode);
          gainNode.connect(this.audioCtx.destination);
          osc.start();
          osc.stop(this.audioCtx.currentTime + 0.6);
        } catch(e){}

        setTimeout(() => {
          showOverlay("GAME OVER", `Final Score: ${this.score}`, "Try Again", () => {
            this.startGame();
          });
        }, 500);
      }

      updateScore() {
        this.scoreElement.textContent = this.score;
      }

      delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
      }
    }

    function showOverlay(title, message, buttonText, callback) {
      const overlay = document.getElementById('gameOverlay');
      const overlayTitle = document.getElementById('overlayTitle');
      const overlayMessage = document.getElementById('overlayMessage');
      const overlayBtn = document.getElementById('overlayBtn');
      if (!overlay || !overlayTitle || !overlayMessage || !overlayBtn) return;

      overlayTitle.textContent = title;
      overlayMessage.textContent = message;
      overlayBtn.textContent = buttonText;

      overlay.style.display = 'flex';

      const newBtn = overlayBtn.cloneNode(true);
      overlayBtn.parentNode.replaceChild(newBtn, overlayBtn);

      newBtn.addEventListener('click', () => {
        overlay.style.display = 'none';
        if (callback) callback();
      });
    }

    // Initialize game when page loads
    document.addEventListener('DOMContentLoaded', () => {
      new SimonGame();

      // FullscreenManager initialization
      if (typeof FullscreenManager !== 'undefined') {
        new FullscreenManager('#gameContainer', '#fullscreenBtn');
      }
    });
  </script>
