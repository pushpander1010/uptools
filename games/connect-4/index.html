  <main id="main" class="wrap">
  <div class="game-wrap">
    <div class="tool-header"><button class="back-btn" onclick="location.href='/games/'">← Games</button><h1 class="h1">🔵 Connect 4</h1><span class="badge">vs Computer</span></div>
    <p class="muted">Tap a column to drop your disc. Connect four in a row to win. You are 🔴, the computer is 🔵.</p>
    <div class="panel center">
      <div id="c4Board" class="grid-board" style="grid-template-columns:repeat(7,1fr);max-width:360px;gap:6px"></div>
    </div>
    <div class="stats">
      <div class="stat"><b id="c4Wins">0</b><span>You</span></div>
      <div class="stat"><b id="c4Loss">0</b><span>CPU</span></div>
      <div class="stat"><b id="c4Draw">0</b><span>Draws</span></div>
    </div>
    <div class="row" style="justify-content:center;margin:10px 0"><button class="btn alt" id="c4New">New Game</button></div>
    <p class="muted center" id="c4Msg">Your move!</p>
  </div>
  <script>
  (function(){
    const R=6,C=7,board=document.getElementById('c4Board');let g=[],turn='P',over=false;
    let w=+localStorage.getItem('c4_w')||0,l=+localStorage.getItem('c4_l')||0,d=+localStorage.getItem('c4_d')||0;
    document.getElementById('c4Wins').textContent=w;document.getElementById('c4Loss').textContent=l;document.getElementById('c4Draw').textContent=d;
    function render(){
      board.innerHTML='';for(let r=0;r<R;r++)for(let c=0;c<C;c++){
        const cell=document.createElement('div');cell.className='cell';cell.style.fontSize='1.5rem';cell.style.cursor='pointer';
        const v=g[r][c];cell.textContent=v==='P'?'🔴':v==='C'?'🔵':'';
        cell.addEventListener('click',function(){play(c);});board.appendChild(cell);
      }
    }
    function newGame(){g=Array.from({length:R},function(){return Array(C).fill(null);});turn='P';over=false;render();document.getElementById('c4Msg').textContent='Your move!';}
    function dropRow(c){for(let r=R-1;r>=0;r--)if(!g[r][c])return r;return -1;}
    function full(){return g.every(function(row){return row.every(function(x){return x;});});}
    function win(r,c,p){const dirs=[[0,1],[1,0],[1,1],[1,-1]];for(let k=0;k<dirs.length;k++){const dr=dirs[k][0],dc=dirs[k][1];let n=1;for(const s of [1,-1]){let i=r+dr*s,j=c+dc*s;while(i>=0&&i<R&&j>=0&&j<C&&g[i][j]===p){n++;i+=dr*s;j+=dc*s;}}if(n>=4)return true;}return false;}
    function play(c){
      if(over||turn!=='P')return;const r=dropRow(c);if(r<0)return;g[r][c]='P';
      if(win(r,c,'P')){over=true;w++;localStorage.setItem('c4_w',w);document.getElementById('c4Wins').textContent=w;document.getElementById('c4Msg').textContent='🎉 You win!';render();return;}
      if(full()){over=true;d++;localStorage.setItem('c4_d',d);document.getElementById('c4Draw').textContent=d;document.getElementById('c4Msg').textContent='Draw!';render();return;}
      turn='C';render();setTimeout(cpu,350);
    }
    function cpu(){
      if(over)return;let mv=-1;
      for(let c=0;c<C;c++){const r=dropRow(c);if(r>=0){g[r][c]='C';if(win(r,c,'C')){mv=c;g[r][c]=null;break;}g[r][c]=null;}}
      if(mv<0)for(let c=0;c<C;c++){const r=dropRow(c);if(r>=0){g[r][c]='P';if(win(r,c,'P')){g[r][c]=null;mv=c;break;}g[r][c]=null;}}
      if(mv<0){const opts=[];for(let c=0;c<C;c++)if(dropRow(c)>=0)opts.push(c);mv=opts[Math.floor(Math.random()*opts.length)];}
      const r=dropRow(mv);g[r][mv]='C';
      if(win(r,mv,'C')){over=true;l++;localStorage.setItem('c4_l',l);document.getElementById('c4Loss').textContent=l;document.getElementById('c4Msg').textContent='CPU wins!';render();return;}
      if(full()){over=true;d++;localStorage.setItem('c4_d',d);document.getElementById('c4Draw').textContent=d;document.getElementById('c4Msg').textContent='Draw!';render();return;}
      turn='P';document.getElementById('c4Msg').textContent='Your move!';render();
    }
    document.getElementById('c4New').addEventListener('click',newGame);
    newGame();
  })();
  </script>
