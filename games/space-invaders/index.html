  <main id="main" class="wrap">
  <div class="game-wrap">
    <div class="tool-header"><button class="back-btn" onclick="location.href='/games/'">← Games</button><h1 class="h1">👾 Space Invaders</h1><span class="badge">Arcade</span></div>
    <p class="muted">Move with arrow keys / A-D or swipe. Tap top of screen to shoot on mobile. Don't let the invaders reach the bottom.</p>
    <div class="panel center">
      <canvas id="siCanvas" width="480" height="540" style="max-width:100%"></canvas>
    </div>
    <div class="stats">
      <div class="stat"><b id="siScore">0</b><span>Score</span></div>
      <div class="stat"><b id="siBest">0</b><span>Best</span></div>
      <div class="stat"><b id="siLives">3</b><span>Lives</span></div>
    </div>
    <div class="row" style="justify-content:center;margin:10px 0"><button class="btn" id="siStart">Start</button></div>
    <p class="muted center" id="siMsg">Press Start.</p>
  </div>
  <script>
  (function(){
    const cv=document.getElementById('siCanvas'),ctx=cv.getContext('2d');
    const W=cv.width,H=cv.height;let ship,bullets,invaders,keys={},raf=null,running=false,score=0,lives=3,best=+localStorage.getItem('si_best')||0,dir=1,dtc=0;
    document.getElementById('siBest').textContent=best;
    function reset(){ship={x:W/2,y:H-40,w:40,h:18};bullets=[];invaders=[];for(let r=0;r<4;r++)for(let c=0;c<8;c++)invaders.push({x:40+c*50,y:40+r*40,a:true});score=0;lives=3;dir=1;dtc=0;}
    function loop(){
      if(!running)return;ctx.clearRect(0,0,W,H);
      if(keys['ArrowLeft']||keys['a'])ship.x-=6;if(keys['ArrowRight']||keys['d'])ship.x+=6;ship.x=Math.max(20,Math.min(W-20,ship.x));
      ctx.fillStyle='#22d3ee';ctx.fillRect(ship.x-20,ship.y,ship.w,ship.h);
      bullets.forEach(function(b){b.y-=8;});bullets=bullets.filter(function(b){return b.y>0;});
      bullets.forEach(function(b){ctx.fillStyle='#fde047';ctx.fillRect(b.x-2,b.y,4,10);});
      let edge=false;invaders.forEach(function(inv){if(!inv.a)return;inv.x+=dir*0.6;if(inv.x<10||inv.x>W-30)edge=true;});
      if(edge){dir*=-1;}
      invaders.forEach(function(inv){if(!inv.a)return;ctx.fillStyle='#ef4444';ctx.fillRect(inv.x,inv.y,28,20);});
      bullets.forEach(function(b){for(const inv of invaders){if(inv.a&&Math.abs(b.x-inv.x-14)<18&&Math.abs(b.y-inv.y-10)<16){inv.a=false;score+=10;b.y=-99;break;}}});
      if(invaders.every(function(i){return !i.a;})){score+=50;reset();}
      dtc++;if(dtc>240){dtc=0;invaders.forEach(function(i){i.y+=12;});if(invaders.some(function(i){return i.a&&i.y>H-60;})){lives--;reset();}}
      document.getElementById('siScore').textContent=score;document.getElementById('siLives').textContent=lives;
      if(lives<=0){running=false;if(score>best){best=score;localStorage.setItem('si_best',best);document.getElementById('siBest').textContent=best;}document.getElementById('siMsg').textContent='Game over! Score: '+score+'. Press Start.';return;}
      raf=requestAnimationFrame(loop);
    }
    function shoot(){if(running)bullets.push({x:ship.x,y:ship.y-10});}
    addEventListener('keydown',function(e){keys[e.key]=true;if(e.key===' '){shoot();e.preventDefault();}});
    addEventListener('keyup',function(e){keys[e.key]=false;});
    cv.addEventListener('pointerdown',function(e){const r=cv.getBoundingClientRect();const y=e.clientY-r.top;if(y<H*0.7)shoot();else{const x=e.clientX-r.left;ship.x=x;}});
    document.getElementById('siStart').addEventListener('click',function(){reset();running=true;document.getElementById('siMsg').textContent='Go!';if(raf)cancelAnimationFrame(raf);loop();});
  })();
  </script>
