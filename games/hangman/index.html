  <script>
      document.getElementById('y').textContent = new Date().getFullYear();

      const WORDS = {
        animals: [
          { word: 'elephant', hint: 'Largest land animal' },
          { word: 'giraffe', hint: 'Tallest animal' },
          { word: 'penguin', hint: 'Flightless bird from Antarctica' },
          { word: 'dolphin', hint: 'Intelligent marine mammal' },
          { word: 'cheetah', hint: 'Fastest land animal' },
          { word: 'kangaroo', hint: 'Australian marsupial' },
          { word: 'crocodile', hint: 'Ancient reptile' },
          { word: 'butterfly', hint: 'Colorful flying insect' },
        ],
        countries: [
          { word: 'australia', hint: 'Country and continent' },
          { word: 'brazil', hint: 'Largest country in South America' },
          { word: 'canada', hint: 'Country north of USA' },
          { word: 'germany', hint: 'European country, capital Berlin' },
          { word: 'japan', hint: 'Island nation in East Asia' },
          { word: 'mexico', hint: 'Country south of USA' },
          { word: 'nigeria', hint: 'Most populous African country' },
          { word: 'thailand', hint: 'Southeast Asian country' },
        ],
        tech: [
          { word: 'algorithm', hint: 'Step-by-step problem solving procedure' },
          { word: 'database', hint: 'Organized collection of data' },
          { word: 'javascript', hint: 'Popular web programming language' },
          { word: 'blockchain', hint: 'Distributed ledger technology' },
          { word: 'encryption', hint: 'Securing data with codes' },
          { word: 'bandwidth', hint: 'Data transfer capacity' },
          { word: 'framework', hint: 'Software development structure' },
          { word: 'interface', hint: 'Point of interaction' },
        ],
        food: [
          { word: 'spaghetti', hint: 'Italian pasta dish' },
          { word: 'avocado', hint: 'Green creamy fruit' },
          { word: 'chocolate', hint: 'Sweet made from cacao' },
          { word: 'pineapple', hint: 'Tropical spiky fruit' },
          { word: 'broccoli', hint: 'Green tree-like vegetable' },
          { word: 'croissant', hint: 'French buttery pastry' },
          { word: 'blueberry', hint: 'Small blue fruit' },
          { word: 'cinnamon', hint: 'Brown spice from tree bark' },
        ],
        sports: [
          { word: 'basketball', hint: 'Sport with hoops and orange ball' },
          { word: 'volleyball', hint: 'Net sport with six players per side' },
          { word: 'badminton', hint: 'Racket sport with shuttlecock' },
          { word: 'swimming', hint: 'Water sport' },
          { word: 'gymnastics', hint: 'Sport with flips and balance' },
          { word: 'archery', hint: 'Sport with bow and arrow' },
          { word: 'wrestling', hint: 'Combat sport' },
          { word: 'marathon', hint: '42km running race' },
        ]
      };

      class SoundEffects {
        constructor() {
          this.ctx = null;
        }
        init() {
          if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
          }
        }
        playCorrect() {
          this.init();
          if (!this.ctx) return;
          try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.frequency.setValueAtTime(600, this.ctx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, this.ctx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.12);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.12);
          } catch (e) {}
        }
        playWrong() {
          this.init();
          if (!this.ctx) return;
          try {
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, this.ctx.currentTime);
            osc.frequency.linearRampToValueAtTime(100, this.ctx.currentTime + 0.2);
            gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.22);
            osc.start();
            osc.stop(this.ctx.currentTime + 0.22);
          } catch (e) {}
        }
        playWin() {
          this.init();
          if (!this.ctx) return;
          try {
            const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
            notes.forEach((freq, i) => {
              const osc = this.ctx.createOscillator();
              const gain = this.ctx.createGain();
              osc.connect(gain);
              gain.connect(this.ctx.destination);
              osc.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.1);
              gain.gain.setValueAtTime(0.05, this.ctx.currentTime + i * 0.1);
              gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i * 0.1 + 0.25);
              osc.start(this.ctx.currentTime + i * 0.1);
              osc.stop(this.ctx.currentTime + i * 0.1 + 0.25);
            });
          } catch (e) {}
        }
        playLose() {
          this.init();
          if (!this.ctx) return;
          try {
            const notes = [392.00, 349.23, 311.13, 261.63]; // G4, F4, D#4, C4
            notes.forEach((freq, i) => {
              const osc = this.ctx.createOscillator();
              const gain = this.ctx.createGain();
              osc.connect(gain);
              gain.connect(this.ctx.destination);
              osc.type = 'sawtooth';
              osc.frequency.setValueAtTime(freq, this.ctx.currentTime + i * 0.12);
              gain.gain.setValueAtTime(0.06, this.ctx.currentTime + i * 0.12);
              gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + i * 0.12 + 0.3);
              osc.start(this.ctx.currentTime + i * 0.12);
              osc.stop(this.ctx.currentTime + i * 0.12 + 0.3);
            });
          } catch (e) {}
        }
      }
      const sounds = new SoundEffects();

      const PARTS = ['h-head', 'h-body', 'h-larm', 'h-rarm', 'h-lleg', 'h-rleg'];
      let word = '', guessed = new Set(), wrongCount = 0, gameOver = false, hasStarted = false;

      function isMidGame() {
        return wrongCount > 0 || guessed.size > 0;
      }

      function confirmRestart(callback) {
        if (isMidGame()) {
          const confirmed = confirm('You are in the middle of a game. Starting a new game will lose your progress. Continue?');
          if (!confirmed) return;
        }
        callback();
      }

      function getWords() {
        const cat = document.getElementById('catSel').value;
        if (cat === 'all') return Object.values(WORDS).flat();
        return WORDS[cat] || WORDS.animals;
      }

      function newGame(force) {
        if (!force && isMidGame()) {
          confirmRestart(() => newGame(true));
          return;
        }
        const pool = getWords();
        const entry = pool[Math.floor(Math.random() * pool.length)];
        word = entry.word.toLowerCase();
        guessed = new Set();
        wrongCount = 0;
        gameOver = false;
        hasStarted = false;

        document.getElementById('hintBox').textContent = `Category: ${document.getElementById('catSel').value === 'all' ? 'Mixed' : document.getElementById('catSel').value} | Hint: ${entry.hint}`;
        document.getElementById('gameMsg').textContent = '';
        document.getElementById('wrongLetters').textContent = 'Wrong: —';
        document.getElementById('gameOverlay').style.display = 'none';

        PARTS.forEach(id => {
          const el = document.getElementById(id);
          el.classList.remove('visible');
          el.style.animation = 'none';
          void el.offsetHeight;
          el.style.animation = '';
        });
        renderWord();
        renderKeyboard();
      }

    function renderWord() {
      const display = document.getElementById('wordDisplay');
      display.innerHTML = word.split('').map(c =>
        `<div class="letter-box">${guessed.has(c) ? c.toUpperCase() : ''}</div>`
      ).join('');
    }

    function renderKeyboard() {
      const kb = document.getElementById('keyboard');
      kb.innerHTML = 'abcdefghijklmnopqrstuvwxyz'.split('').map(c => {
        const isGuessed = guessed.has(c);
        const isWrong = isGuessed && !word.includes(c);
        const isCorrect = isGuessed && word.includes(c);
        return `<button class="key-btn ${isWrong ? 'wrong' : isCorrect ? 'correct' : ''}" data-key="${c}" ${isGuessed || gameOver ? 'disabled' : ''}>${c.toUpperCase()}</button>`;
      }).join('');
      kb.querySelectorAll('.key-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          sounds.init();
          guess(btn.dataset.key);
        });
      });
    }

    function guess(letter) {
          if (gameOver || guessed.has(letter)) return;
          guessed.add(letter);
          hasStarted = true;

          if (!word.includes(letter)) {
            wrongCount++;
            sounds.playWrong();
            if (wrongCount <= PARTS.length) {
              const el = document.getElementById(PARTS[wrongCount - 1]);
              el.classList.add('visible');
            }
          } else {
            sounds.playCorrect();
          }

          const wrongLetters = [...guessed].filter(c => !word.includes(c));
          document.getElementById('wrongLetters').textContent = wrongLetters.length
            ? `Wrong: ${wrongLetters.map(c => c.toUpperCase()).join(', ')}`
            : 'Wrong: —';

          renderWord();
          renderKeyboard();

          const won = word.split('').every(c => guessed.has(c));
          if (won) {
            gameOver = true;
            sounds.playWin();
            document.getElementById('overlayTitle').textContent = '🎉 You won!';
            document.getElementById('overlayMessage').textContent = `The word was: ${word.toUpperCase()}`;
            document.getElementById('gameOverlay').style.display = 'flex';
          } else if (wrongCount >= PARTS.length) {
            gameOver = true;
            sounds.playLose();
            document.getElementById('overlayTitle').textContent = '💀 Game over!';
            document.getElementById('overlayMessage').textContent = `The word was: ${word.toUpperCase()}`;
            document.getElementById('gameOverlay').style.display = 'flex';
            renderKeyboard();
          }
        }

        document.addEventListener('keydown', (e) => {
          if (e.key.match(/^[a-z]$/i) && !gameOver) {
            sounds.init();
            guess(e.key.toLowerCase());
          }
        });

        document.getElementById('newGameBtn').addEventListener('click', () => newGame());
        document.getElementById('catSel').addEventListener('change', () => newGame());
        document.getElementById('overlayActionBtn').addEventListener('click', () => newGame(true));

        newGame();

        // Proper FullscreenManager initialization
        if (window.FullscreenManager) {
          window.fullscreenManager = new FullscreenManager('#gameContainer', '#fullscreenBtn');
        }
      </script>
