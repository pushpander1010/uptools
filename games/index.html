/* =========================================================
   Games Page — Complete Design System
   ========================================================= */

/* --- Hero --- */
.games-hero{
  text-align:center;
  padding:2.5rem 1rem 1.5rem;
  margin-bottom:1.5rem;
  border-radius:var(--radius);
  background:linear-gradient(180deg,rgba(99,102,241,.1) 0%,rgba(168,85,247,.04) 50%,transparent 100%);
  border:1px solid rgba(99,102,241,.15);
  position:relative;
  overflow:hidden}
.games-hero::before{
  content:"";
  position:absolute;inset:0;
  background:radial-gradient(circle 400px at 50% 0%,rgba(99,102,241,.12),transparent 70%);
  pointer-events:none}
.games-hero h1{
  font-size:2.4rem;
  font-weight:800;
  letter-spacing:-.04em;
  margin:0 0 .3rem;
  background:linear-gradient(135deg,#fff 0%,#c7d2fe 40%,var(--accent-2) 70%,rgba(236,72,153,.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  position:relative}
.games-hero .sub{
  color:var(--text-2);
  font-size:.95rem;
  margin:0;
  position:relative}
.games-hero .stats{
  display:flex;
  justify-content:center;
  gap:1.5rem;
  margin-top:1rem;
  position:relative}
.games-hero .stat{
  display:flex;
  flex-direction:column;
  align-items:center}
.games-hero .stat b{
  font-size:1.4rem;
  font-weight:800;
  color:var(--accent-2)}
.games-hero .stat span{
  font-size:.7rem;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.05em}

/* --- Search + Filters --- */
.controls-bar{
  display:grid;
  gap:12px;
  margin-bottom:1.5rem}
.controls-bar .search{
  display:flex;
  align-items:center;
  gap:10px;
  background:var(--surface-input);
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:10px 14px;
  transition:border-color var(--trans)}
.controls-bar .search:focus-within{
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(99,102,241,.1)}
.controls-bar .search span{
  opacity:.5;
  font-size:1.1rem}
.controls-bar .search input{
  flex:1;
  min-width:0;
  background:transparent;
  border:0;
  outline:0;
  color:var(--text);
  font-size:15px}
.controls-bar .search input::placeholder{
  color:var(--muted)}
.btn.alt{
  background:transparent;
  color:var(--text-2);
  border:1px solid var(--border);
  min-height:36px;
  font-size:13px;
  padding:6px 14px;
  border-radius:var(--radius-sm);
  cursor:pointer;
  font-weight:500;
  transition:all var(--trans)}
.btn.alt:hover{
  border-color:var(--accent-border);
  color:var(--text);
  background:rgba(99,102,241,.05)}
.filters{
  display:flex;
  gap:6px;
  flex-wrap:wrap}

/* --- Section Headers --- */
.section{margin:20px 0}
.section h2{
  font-size:1.2rem;
  font-weight:700;
  margin:0 0 12px;
  color:var(--text)}

/* --- Games Grid --- */
.games-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  gap:16px}

/* --- Game Card --- */
.game-card{
  display:grid;
  grid-template-rows:auto auto auto auto auto;
  gap:10px;
  padding:22px;
  border-radius:var(--radius);
  background:var(--surface);
  border:1px solid var(--border);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative;
  overflow:hidden}
.game-card::before{
  content:"";
  position:absolute;
  top:0;left:0;right:0;
  height:3px;
  background:linear-gradient(90deg,var(--accent),var(--accent-2),rgba(236,72,153,.6));
  opacity:0;
  transition:opacity .25s}
.game-card::after{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle 200px at var(--mx,50%) var(--my,50%),rgba(99,102,241,.06),transparent 70%);
  opacity:0;
  transition:opacity .3s;
  pointer-events:none}
.game-card:hover{
  border-color:rgba(99,102,241,.25);
  transform:translateY(-6px);
  box-shadow:
    0 20px 40px rgba(0,0,0,.35),
    0 0 0 1px rgba(99,102,241,.1),
    0 0 30px rgba(99,102,241,.05)}
.game-card:hover::before{opacity:1}
.game-card:hover::after{opacity:1}

.game-card .row{
  display:flex;
  align-items:center;
  justify-content:space-between}

/* --- Game Icon --- */
.game-icon{
  width:52px;
  height:52px;
  display:grid;
  place-items:center;
  font-size:1.7rem;
  border-radius:14px;
  background:linear-gradient(135deg,rgba(99,102,241,.12),rgba(168,85,247,.08));
  border:1px solid rgba(99,102,241,.15);
  transition:all .25s cubic-bezier(.4,0,.2,1);
  position:relative}
.game-icon::after{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  opacity:0;
  z-index:-1;
  transition:opacity .25s}
.game-card:hover .game-icon{
  transform:scale(1.12) rotate(-5deg);
  border-color:rgba(99,102,241,.3);
  box-shadow:0 4px 16px rgba(99,102,241,.2)}
.game-card:hover .game-icon::after{opacity:.15}

/* --- Badge --- */
.badge{
  font-size:.65rem;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:.04em;
  padding:3px 10px;
  border-radius:var(--radius-pill);
  background:rgba(99,102,241,.1);
  color:var(--accent-2);
  border:1px solid rgba(99,102,241,.2)}

/* --- Game Title --- */
.game-title{
  font-size:1.05rem;
  font-weight:700;
  color:var(--text);
  text-decoration:none;
  transition:color .2s;
  line-height:1.3}
.game-title:hover{color:var(--accent-2)}

/* --- Game Description --- */
.game-desc{
  font-size:.82rem;
  color:var(--text-2);
  line-height:1.5;
  margin:0}

/* --- Tags --- */
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:5px}
.tag{
  font-size:.65rem;
  padding:2px 8px;
  border-radius:999px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.06);
  color:var(--muted);
  font-weight:500;
  text-transform:capitalize;
  transition:all .2s}
.game-card:hover .tag{
  background:rgba(99,102,241,.06);
  border-color:rgba(99,102,241,.12);
  color:var(--text-2)}

/* --- CTA Row --- */
.cta{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:4px}
.cta .btn{
  min-height:36px;
  padding:6px 20px;
  font-size:.82rem;
  font-weight:600;
  border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  color:#fff;
  border:none;
  cursor:pointer;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
  gap:6px;
  transition:all .2s;
  position:relative;
  overflow:hidden}
.cta .btn::before{
  content:"";
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  opacity:0;
  transition:opacity .2s}
.cta .btn:hover{
  filter:brightness(1.1);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(99,102,241,.3)}
.cta .btn:hover::before{opacity:1}
.cta .btn:active{transform:scale(.97)}

/* --- Fav Button --- */
.fav{
  background:none;
  border:none;
  color:var(--muted);
  font-size:.75rem;
  cursor:pointer;
  padding:5px 10px;
  border-radius:6px;
  transition:all .2s;
  font-weight:500}
.fav:hover{
  color:var(--accent-2);
  background:rgba(99,102,241,.08)}
.fav.active{
  color:#eab308;
  background:rgba(234,179,8,.08)}

/* --- Neon Canvas --- */
.neon-canvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  overflow:hidden}
.n-shape{
  position:absolute;
  left:var(--x);
  top:var(--y);
  font-size:1.5rem;
  opacity:.06;
  animation:float var(--d,8s) ease-in-out infinite alternate;
  filter:blur(.5px)}
@keyframes float{
  0%{transform:translateY(0) rotate(0deg)}
  100%{transform:translateY(-30px) rotate(10deg)}}

/* --- Small tip text --- */
.small{font-size:.75rem;color:var(--muted);margin-top:8px}

@media(max-width:640px){

  <script>
    /* ------------------- Neon background seeding (tiny JS, no layout impact) ------------------- */
    (() => {
      const canvas = document.getElementById('neonCanvas');
      if (!canvas) return;
      const SHAPES = ["🎮", "★", "❤", "✦", "◆", "▲", "✪", "♥"];
      const COUNT = Math.min(28, Math.max(16, Math.floor(window.innerWidth / 60))); // scale lightly by screen
      for (let i = 0; i < COUNT; i++) {
        const s = document.createElement('span');
        s.className = 'n-shape';
        s.textContent = SHAPES[(Math.random() * SHAPES.length) | 0];
        s.style.setProperty('--x', (Math.random() * 100) + 'vw');
        s.style.setProperty('--y', (Math.random() * 100) + 'vh');
        s.style.setProperty('--d', (8 + Math.random() * 12).toFixed(2) + 's');
        s.style.animationDelay = (Math.random() * -12).toFixed(2) + 's';
        canvas.appendChild(s);
      }
      // pause animations when tab is hidden (battery-friendly)
      const setState = (st) => {
        canvas.style.animationPlayState = st;
        canvas.querySelectorAll('.n-shape').forEach(n => n.style.animationPlayState = st);
      };
      document.addEventListener('visibilitychange', () => setState(document.hidden ? 'paused' : 'running'));
    })();

    /* --- Card mouse glow tracking --- */

    // ---------- Helpers
    const $ = (s, el = document) => el.querySelector(s);
    const elGrid = $("#grid");
    const elFavGrid = $("#favGrid");
    const elRecentGrid = $("#recentGrid");
    const elFavSec = $("#favSec");
    const elRecentSec = $("#recentSec");
    const q = $("#q");
    const clearBtn = $("#clearBtn");
    const year = $("#y"); year.textContent = new Date().getFullYear();

    const favKey = "uptools-game-favs";
    const recentKey = "uptools-game-recent";

    const getFavs = () => new Set(JSON.parse(localStorage.getItem(favKey) || "[]"));
    const setFavs = (set) => localStorage.setItem(favKey, JSON.stringify([...set]));

    const getRecent = () => JSON.parse(localStorage.getItem(recentKey) || "[]"); // [{slug, ts}]
    const pushRecent = (slug) => {
      const now = Date.now();
      const list = getRecent().filter(x => x.slug !== slug);
      list.unshift({ slug, ts: now });
      localStorage.setItem(recentKey, JSON.stringify(list.slice(0, 8)));
    };

    // Called from game pages (optional): add ?played=slug to return URL
    (() => {
      const u = new URL(location.href);
      const played = u.searchParams.get("played");
      if (played) pushRecent(played);
    })();

    // ---------- Render
    function cardHTML(g, favs) {
      const isFav = favs.has(g.slug);
      const tags = (g.tags || []).slice(0, 4).map(t => `<span class="tag">${t}</span>`).join("");
      const badge = g.tags.includes("quick") ? "Quick Play" :
        g.tags.includes("brain") ? "Brain" :
          g.tags.includes("reflex") ? "Reflex" : "Classic";
      return `
        <article class="game-card" data-tags="${(g.tags || []).join(',')}" data-title="${g.title.toLowerCase()}">
          <div class="row">
            <div class="game-icon" aria-hidden="true">${g.icon}</div>
            <span class="badge">${badge}</span>
          </div>
          <a class="game-title" href="${g.href}" aria-label="Play ${g.title}">${g.title}</a>
          <p class="game-desc">${g.desc}</p>
          <div class="tags">${tags}</div>
          <div class="cta">
            <a class="btn" href="${g.href}">Play</a>
            <button class="fav ${isFav ? 'active' : ''}" data-fav="${g.slug}" aria-label="Favourite ${g.title}" title="Favourite">
              ${isFav ? '★ Favourited' : '☆ Favourite'}
            </button>
          </div>
        </article>
      `;
    }

    function renderAll(list) {
      const favs = getFavs();
      elGrid.innerHTML = list.map(g => cardHTML(g, favs)).join("");
      bindFavButtons(elGrid);
    }

    function renderSection(container, games) {
      const favs = getFavs();
      container.innerHTML = games.map(g => cardHTML(g, favs)).join("");
      bindFavButtons(container);
    }

    function bindFavButtons(scope) {
      scope.querySelectorAll("[data-fav]").forEach(btn => {
        btn.addEventListener("click", (e) => {
          const slug = btn.getAttribute("data-fav");
          const favs = getFavs();
          if (favs.has(slug)) favs.delete(slug); else favs.add(slug);
          setFavs(favs);
          // Update buttons in all grids
          document.querySelectorAll(`[data-fav="${slug}"]`).forEach(b => {
            const active = favs.has(slug);
            b.classList.toggle("active", active);
            b.textContent = active ? "★ Favourited" : "☆ Favourite";
          });
          renderFavs(); // keep section in sync
        });
      });
      // Track clicks to add to recent
      scope.querySelectorAll("a.btn, a.game-title").forEach(a => {
        a.addEventListener("click", () => {
          const slug = a.closest(".game-card").querySelector("[data-fav]").getAttribute("data-fav");
          pushRecent(slug);
        });
      });
    }

    function renderFavs() {
      const favs = getFavs();
      const favList = GAMES.filter(g => favs.has(g.slug));
      elFavSec.hidden = favList.length === 0;
      if (!elFavSec.hidden) renderSection(elFavGrid, favList);
    }

    function renderRecent() {
      const rec = getRecent().slice(0, 6);
      const games = rec.map(r => GAMES.find(g => g.slug === r.slug)).filter(Boolean);
      elRecentSec.hidden = games.length === 0;
      if (!elRecentSec.hidden) renderSection(elRecentGrid, games);
    }

    // ---------- Search + Filters
    function currentFilters() {
      return [...document.querySelectorAll('.filters input:checked')].map(i => i.value);
    }

    function applyFilters() {
      const text = q.value.trim().toLowerCase();
      const filters = currentFilters();
      const cards = [...document.querySelectorAll(".game-card")];
      let shown = 0;
      for (const c of cards) {
        const title = c.dataset.title;
        const tags = (c.dataset.tags || "").split(",");
        const matchesText = !text || title.includes(text);
        const matchesTags = filters.length === 0 || filters.every(f => tags.includes(f));
        const visible = matchesText && matchesTags;
        c.style.display = visible ? "grid" : "none";
        if (visible) shown++;
      }
      // Optional: if zero results, we could show a friendly message
    }

    q.addEventListener("input", applyFilters);
    clearBtn.addEventListener("click", () => { q.value = ""; applyFilters(); q.focus() });
    document.querySelectorAll('.filters input').forEach(i => i.addEventListener("change", applyFilters));

    // Setup mobile menu
    // ---------- Init
    renderAll(GAMES);
    renderFavs();
    renderRecent();
    applyFilters();
  </script>
