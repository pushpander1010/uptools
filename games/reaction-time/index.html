  <main id="main" class="wrap">
  <div class="game-wrap">
    <div class="tool-header"><button class="back-btn" onclick="location.href='/games/'">← Games</button><h1 class="h1">⚡ Reaction Time Test</h1><span class="badge">No ads interrupting gameplay</span></div>
    <p class="muted">Wait for the screen to turn green, then tap or click as fast as you can. 5 rounds, your average is scored.</p>
    <div class="panel center">
      <div id="rtBox" style="height:200px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:800;background:#7f1d1d;cursor:pointer;user-select:none;border:1px solid var(--cardBorder)">Click to start</div>
    </div>
    <div class="stats">
      <div class="stat"><b id="rtLast">–</b><span>Last (ms)</span></div>
      <div class="stat"><b id="rtBest">–</b><span>Best (ms)</span></div>
      <div class="stat"><b id="rtAvg">–</b><span>Average</span></div>
      <div class="stat"><b id="rtRound">0/5</b><span>Rounds</span></div>
    </div>
    <p class="muted center" id="rtMsg"></p>
  </div>
  <script>
  (()=>{
    const box=document.getElementById('rtBox');
    let state='idle',t0=0,rounds=0,sum=0,best=Infinity;
    const done=()=>rounds>=5;
    function reset(){box.style.background='#7f1d1d';box.textContent='Click to start';state='idle';}
    function wait(){box.style.background='#7f1d1d';box.textContent='Wait for green…';state='wait';
      const delay=800+Math.random()*2200;
      box._t=setTimeout(()=>{box.style.background='#15803d';box.textContent='TAP NOW!';state='go';t0=performance.now();},delay);
    }
    box.addEventListener('click',()=>{
      if(done()){reset();rounds=0;sum=0;best=Infinity;document.getElementById('rtRound').textContent='0/5';document.getElementById('rtAvg').textContent='–';document.getElementById('rtBest').textContent='–';document.getElementById('rtMsg').textContent='New round started.';return;}
      if(state==='idle'){wait();return;}
      if(state==='wait'){clearTimeout(box._t);state='early';box.style.background='#b91c1c';box.textContent='Too soon! Click to retry';document.getElementById('rtMsg').textContent='You clicked before green — that round does not count.';return;}
      if(state==='go'){const ms=Math.round(performance.now()-t0);state='idle';rounds++;sum+=ms;if(ms<best)best=ms;
        document.getElementById('rtLast').textContent=ms;document.getElementById('rtBest').textContent=best;document.getElementById('rtAvg').textContent=Math.round(sum/rounds);document.getElementById('rtRound').textContent=rounds+'/5';
        if(done()){box.style.background='#0e7490';box.textContent='Done! Click to play again';document.getElementById('rtMsg').textContent='Your average reaction time was '+Math.round(sum/5)+' ms.';}
        else {box.style.background='#7f1d1d';box.textContent='Click for next round';}
      }
    });
  })();
  </script>
