  <style>
    body {
      --accent: #ff9800;
      background: radial-gradient(1200px 600px at 10% -10%, #1a2a3a 0%, var(--bg) 45%) fixed;
    }

    .game-container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--card);
      border: 1px solid var(--cardBorder);
      border-radius: var(--radius);
      text-align: center;
      position: relative;
    }

    .game-header {
      margin-bottom: 2rem;
    }

    .game-header h1 {
      margin: 0 0 0.5rem;
      font-size: 2rem;
    }

    .game-header p {
      color: var(--muted);
      margin: 0;
    }

    .mode-selector {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin: 1.5rem 0;
      flex-wrap: wrap;
    }

    .mode-btn {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      border: 1px solid var(--cardBorder);
      padding: 0.75rem 1.5rem;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 600;
    }

    .mode-btn.active {
      background: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    .mode-btn:hover:not(.active) {
      border-color: var(--accent);
      background: rgba(255, 152, 0, 0.1);
    }

    .score-board {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 1rem;
      margin: 1.5rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius);
    }

    .score-item {
      text-align: center;
    }

    .score-label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 0.25rem;
    }

    .score-value {
      font-size: 1.8rem;
      font-weight: bold;
      color: var(--accent);
    }

    .vs-text {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-weight: bold;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
      margin: 2rem 0;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius);
    }

    .cell {
      aspect-ratio: 1;
      background: var(--card);
      border: 2px solid var(--cardBorder);
      border-radius: 0.5rem;
      font-size: 2.5rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      min-height: 80px;
    }

    .cell:hover:not(.disabled) {
      border-color: var(--accent);
      background: rgba(255, 152, 0, 0.1);
      transform: translateY(-2px);
    }

    .cell.disabled {
      cursor: not-allowed;
    }

    .cell.x {
      color: #4caf50;
    }

    .cell.o {
      color: #f44336;
    }

    .cell.winner {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(255, 152, 0, 0.5);
      animation: winner-glow 0.6s ease-in-out;
    }

    @keyframes winner-glow {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .status {
      font-size: 1.2rem;
      font-weight: bold;
      margin: 1.5rem 0;
      min-height: 2rem;
      color: var(--accent);
    }

    .status.x-turn {
      color: #4caf50;
    }

    .status.o-turn {
      color: #f44336;
    }

    .status.draw {
      color: #ff9800;
    }

    .controls {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
      margin: 1.5rem 0;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn.secondary {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--cardBorder);
    }

    .btn.secondary:hover {
      border-color: var(--accent);
      background: rgba(255, 152, 0, 0.1);
    }

    .multiplayer-setup {
      display: none;
      margin: 1.5rem 0;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border-radius: var(--radius);
      border: 1px solid var(--cardBorder);
    }

    .multiplayer-setup.active {
      display: block;
    }

    .setup-section {
      margin-bottom: 1.5rem;
    }

    .setup-section:last-child {
      margin-bottom: 0;
    }

    .setup-section h3 {
      margin: 0 0 1rem;
      color: var(--accent);
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      flex-direction: column;
      margin-bottom: 1rem;
    }

    .input-group input {
      padding: 0.75rem;
      border: 1px solid var(--cardBorder);
      border-radius: 0.5rem;
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(255, 152, 0, 0.3);
    }

    .game-link {
      display: none;
      padding: 1rem;
      background: rgba(76, 175, 80, 0.1);
      border-radius: 0.5rem;
      margin-top: 1rem;
    }

    .game-link.active {
      display: block;
    }

    .game-link h4 {
      margin: 0 0 0.75rem;
      color: #4caf50;
    }

    .link-input-group {
      display: flex;
      gap: 0.5rem;
      align-items: center;
    }

    .link-input-group input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid var(--cardBorder);
      border-radius: 0.5rem;
      background: var(--card);
      color: var(--text);
    }

    .waiting-message {
      display: none;
      text-align: center;
      padding: 1rem;
      color: var(--muted);
    }

    .waiting-message.active {
      display: block;
    }

    .fullscreen-btn {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.5rem 0.75rem;
      border-radius: 0.5rem;
      cursor: pointer;
      font-size: 1.2rem;
      z-index: 100;
      transition: all 0.2s ease;
      font-weight: 700;
    }

    .fullscreen-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 4px 12px rgba(255, 152, 0, 0.3);
    }

    .fullscreen-btn:active {
      transform: scale(0.98);
    }

    .fullscreen-mode .board {
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      max-width: 90vmin;
      margin: 2rem auto;
    }

    .fullscreen-mode .cell {
      min-height: min(20vmin, 150px);
      font-size: min(8vmin, 3rem);
    }

    .fullscreen-mode .score-board {
      max-width: 90vmin;
      margin: 1.5rem auto;
    }

    .fullscreen-mode .game-container {
      max-width: 100vw;
      width: 100%;
      margin: 0;
      padding: 1rem;
    }

    @media (max-width: 768px) {
      .game-container {
        margin: 1rem;
        padding: 1rem;
      }

      .board {
        gap: 0.5rem;
        padding: 0.75rem;
      }

      .cell {
        min-height: 70px;
        font-size: 2rem;
      }

      .score-board {
        gap: 0.75rem;
        padding: 0.75rem;
        margin: 1rem 0;
      }

      .score-value {
        font-size: 1.5rem;
      }

      .mode-selector {
        gap: 0.25rem;
      }

      .mode-btn {
        padding: 0.5rem 1rem;
        font-size: 0.9rem;
      }
    }

    @media (max-width: 480px) {
      .game-container {
        margin: 0.5rem;
        padding: 0.75rem;
      }

      .game-header h1 {
        font-size: 1.5rem;
      }

      .board {
        gap: 0.4rem;
        padding: 0.5rem;
      }

      .cell {
        min-height: 60px;
        font-size: 1.5rem;
      }

      .score-board {
        gap: 0.5rem;
        padding: 0.5rem;
        margin: 0.75rem 0;
      }

      .score-value {
        font-size: 1.2rem;
      }

      .mode-btn {
        padding: 0.4rem 0.8rem;
        font-size: 0.8rem;
      }

      .btn {
        padding: 0.6rem 1rem;
        font-size: 0.9rem;
      }
    }
  </style>

  <script>
    class TicTacToeGame {
      constructor() {
        this.gameMode = 'computer';
        this.board = Array(9).fill(null);
        this.currentPlayer = 'X';
        this.gameOver = false;
        this.player1Score = 0;
        this.player2Score = 0;
        this.multiplayerManager = null;
        this.isWaitingForOpponent = false;
        this.init();
      }

      init() {
        this.bindEvents();
        this.checkUrlForGameCode();
        this.loadScores();
      }

      bindEvents() {
        document.querySelectorAll('.cell').forEach(cell => {
          cell.addEventListener('click', (e) => this.handleCellClick(e.target));
        });

        document.getElementById('newGameBtn').addEventListener('click', () => this.newGame());
        document.getElementById('resetBtn').addEventListener('click', () => this.resetScores());

        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.addEventListener('click', (e) => this.switchGameMode(e.target.dataset.mode));
        });
      }

      handleCellClick(cell) {
        const index = parseInt(cell.dataset.index);
        if (this.board[index] || this.gameOver) return;

        if (this.gameMode === 'computer') {
          this.makeMove(index, 'X');
          if (!this.gameOver) {
            setTimeout(() => this.computerMove(), 500);
          }
        } else if (this.gameMode === 'multiplayer') {
          this.makeMultiplayerMove(index);
        }
      }

      makeMove(index, player) {
        this.board[index] = player;
        this.updateBoard();
        
        const winner = this.checkWinner();
        if (winner) {
          this.endGame(winner);
        } else if (this.board.every(cell => cell !== null)) {
          this.endGame('draw');
        } else {
          this.currentPlayer = player === 'X' ? 'O' : 'X';
          this.updateStatus();
        }
      }

      computerMove() {
        const availableMoves = this.board
          .map((cell, index) => cell === null ? index : null)
          .filter(index => index !== null);

        if (availableMoves.length === 0) return;

        // Simple AI: try to win, block opponent, or random
        let move = this.findWinningMove('O') || 
                   this.findWinningMove('X') || 
                   availableMoves[Math.floor(Math.random() * availableMoves.length)];

        this.makeMove(move, 'O');
      }

      findWinningMove(player) {
        for (let i = 0; i < 9; i++) {
          if (this.board[i] === null) {
            this.board[i] = player;
            if (this.checkWinner() === player) {
              this.board[i] = null;
              return i;
            }
            this.board[i] = null;
          }
        }
        return null;
      }

      checkWinner() {
        const lines = [
          [0, 1, 2], [3, 4, 5], [6, 7, 8],
          [0, 3, 6], [1, 4, 7], [2, 5, 8],
          [0, 4, 8], [2, 4, 6]
        ];

        for (let line of lines) {
          const [a, b, c] = line;
          if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
            return this.board[a];
          }
        }
        return null;
      }

      endGame(result) {
        this.gameOver = true;
        
        if (result === 'draw') {
          this.updateStatus('It\'s a Draw!', 'draw');
        } else if (result === 'X') {
          this.player1Score++;
          this.updateStatus('🎉 You Win!', 'x-turn');
        } else {
          this.player2Score++;
          this.updateStatus('😔 You Lose!', 'o-turn');
        }

        this.saveScores();
        this.updateScores();
        this.highlightWinningCells();
      }

      highlightWinningCells() {
        const lines = [
          [0, 1, 2], [3, 4, 5], [6, 7, 8],
          [0, 3, 6], [1, 4, 7], [2, 5, 8],
          [0, 4, 8], [2, 4, 6]
        ];

        for (let line of lines) {
          const [a, b, c] = line;
          if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
            document.querySelectorAll('.cell').forEach((cell, index) => {
              if (line.includes(index)) {
                cell.classList.add('winner');
              }
            });
            break;
          }
        }
      }

      updateBoard() {
        document.querySelectorAll('.cell').forEach((cell, index) => {
          cell.textContent = this.board[index] || '';
          cell.classList.remove('x', 'o', 'winner', 'disabled');
          if (this.board[index]) {
            cell.classList.add(this.board[index].toLowerCase());
            cell.classList.add('disabled');
          }
        });
      }

      updateStatus(message, className) {
        const status = document.getElementById('status');
        if (message) {
          status.textContent = message;
          status.className = 'status ' + (className || '');
        } else {
          status.textContent = `${this.currentPlayer === 'X' ? 'Your' : 'Computer\'s'} turn (${this.currentPlayer})`;
          status.className = 'status ' + (this.currentPlayer === 'X' ? 'x-turn' : 'o-turn');
        }
      }

      updateScores() {
        document.getElementById('player1Score').textContent = this.player1Score;
        document.getElementById('player2Score').textContent = this.player2Score;
      }

      saveScores() {
        localStorage.setItem('tictactoe-scores', JSON.stringify({
          player1: this.player1Score,
          player2: this.player2Score
        }));
      }

      loadScores() {
        const saved = JSON.parse(localStorage.getItem('tictactoe-scores') || '{}');
        this.player1Score = saved.player1 || 0;
        this.player2Score = saved.player2 || 0;
        this.updateScores();
      }

      newGame() {
        this.board = Array(9).fill(null);
        this.currentPlayer = 'X';
        this.gameOver = false;
        this.updateBoard();
        this.updateStatus();
      }

      resetScores() {
        this.player1Score = 0;
        this.player2Score = 0;
        this.saveScores();
        this.updateScores();
        this.newGame();
      }

      switchGameMode(mode) {
        this.gameMode = mode;
        document.querySelectorAll('.mode-btn').forEach(btn => {
          btn.classList.toggle('active', btn.dataset.mode === mode);
        });

        const setup = document.getElementById('multiplayerSetup');
        setup.classList.toggle('active', mode === 'multiplayer');

        if (mode === 'computer') {
          document.getElementById('player1Label').textContent = 'You';
          document.getElementById('player2Label').textContent = 'Computer';
        } else {
          document.getElementById('player1Label').textContent = 'Player 1';
          document.getElementById('player2Label').textContent = 'Player 2';
        }

        this.newGame();
      }

      checkUrlForGameCode() {
        const urlParams = new URLSearchParams(window.location.search);
        const gameCode = urlParams.get('game');
        if (gameCode) {
          document.getElementById('gameCode').value = gameCode;
          this.switchGameMode('multiplayer');
        }
      }

      makeMultiplayerMove(index) {
        if (!this.multiplayerManager || !this.multiplayerManager.isGameReady()) {
          alert('Game not ready. Create or join first.');
          return;
        }

        if (this.isWaitingForOpponent) {
          alert('Waiting for opponent...');
          return;
        }

        try {
          this.multiplayerManager.makeMove(index);
          this.isWaitingForOpponent = true;
          document.getElementById('status').textContent = 'Waiting for opponent...';
        } catch (err) {
          alert('Error: ' + err.message);
        }
      }
    }

    let game;

    function createMultiplayerGame() {
      const playerName = document.getElementById('playerName').value.trim();
      if (!playerName) {
        alert('Please enter your name!');
        return;
      }

      try {
        const manager = new TicTacToeMultiplayer({
          onStateChange: (state) => updateMultiplayerDisplay(state),
          onRoundComplete: (roundData) => handleMultiplayerRound(roundData)
        });

        const { gameId, gameUrl } = manager.createGame(playerName);
        game.multiplayerManager = manager;

        document.getElementById('sharableLink').value = gameUrl;
        document.getElementById('gameLink').classList.add('active');
        document.getElementById('waitingMessage').classList.add('active');
        document.getElementById('createSection').style.display = 'none';
        document.getElementById('joinSection').style.display = 'none';

        document.getElementById('player1Label').textContent = playerName;
        document.getElementById('player2Label').textContent = 'Waiting...';
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function joinMultiplayerGame() {
      const gameCode = document.getElementById('gameCode').value.trim();
      const playerName = document.getElementById('joinPlayerName').value.trim();

      if (!gameCode || !playerName) {
        alert('Please enter both game code and your name!');
        return;
      }

      try {
        const manager = new TicTacToeMultiplayer({
          onStateChange: (state) => updateMultiplayerDisplay(state),
          onRoundComplete: (roundData) => handleMultiplayerRound(roundData)
        });

        manager.joinGame(gameCode, playerName);
        game.multiplayerManager = manager;

        document.getElementById('multiplayerSetup').classList.remove('active');
        document.getElementById('player1Label').textContent = manager.gameState.player1.name;
        document.getElementById('player2Label').textContent = playerName;
        document.getElementById('status').textContent = 'Game started! Your turn.';
      } catch (err) {
        alert('Error: ' + err.message);
      }
    }

    function copyGameLink() {
      const link = document.getElementById('sharableLink').value;
      navigator.clipboard.writeText(link).then(() => {
        alert('Link copied to clipboard!');
      }).catch(() => {
        alert('Failed to copy. Please copy manually.');
      });
    }
