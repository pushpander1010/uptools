    <style>
        body {
            --accent: #ff6b6b;
            --bg: #0f1419;
            --card: #1e2634;
            background: linear-gradient(135deg, var(--bg), #1a1f2e);
        }

        .game-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin: 2rem auto;
            max-width: 300px;
        }

        .cell {
            aspect-ratio: 1;
            background: var(--card);
            border: 2px solid var(--cardBorder);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text);
        }

        .cell:hover {
            border-color: var(--accent);
            transform: scale(1.05);
        }

        .cell.x {
            color: #ff6b6b;
        }

        .cell.o {
            color: #4ecdc4;
        }

        .cell.winning {
            background: var(--accent);
            color: white;
            animation: pulse 0.6s ease-in-out;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }
        }

        .game-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 1rem 0;
            padding: 1rem;
            background: var(--card);
            border-radius: var(--radius);
            border: 1px solid var(--cardBorder);
        }

        .score {
            display: flex;
            gap: 1rem;
        }

        .score-item {
            text-align: center;
        }

        .score-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }

        .score-label {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .game-status {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text);
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 1rem 0;
        }

        .btn-game {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            background: var(--accent);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-game:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
        }

        .btn-secondary {
            background: var(--cardBorder);
        }

        .difficulty-selector {
            margin: 1rem 0;
        }

        .difficulty-btn {
            padding: 0.5rem 1rem;
            margin: 0 0.25rem;
            border: 1px solid var(--cardBorder);
            background: var(--card);
            color: var(--text);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .difficulty-btn.active {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }

        .difficulty-btn:hover {
            border-color: var(--accent);
        }

        /* Fullscreen Styles */
        .fullscreen-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
            transition: all 0.2s ease;
        }
        .fullscreen-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        /* Fullscreen mode styles */
        .fullscreen-mode {
            position: fixed !important;
            top: 0 !important;
            left: 0 !important;
            width: 100vw !important;
            height: 100vh !important;
            background: var(--bg) !important;
            z-index: 9999 !important;
            margin: 0 !important;
            padding: 1rem !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .fullscreen-mode header {
            display: none !important;
        }

        .fullscreen-mode .container {
            width: 100% !important;
            height: 100% !important;
            margin: 0 !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .fullscreen-mode .game-container {
            max-width: none !important;
            width: 100% !important;
            display: flex !important;
            flex-direction: column !important;
            justify-content: center !important;
            align-items: center !important;
        }

        .fullscreen-mode .game-board {
            max-width: min(60vmin, 400px) !important;
            width: min(60vmin, 400px) !important;
            margin: 1rem auto !important;
        }

        .fullscreen-mode .cell {
            font-size: min(8vmin, 4rem) !important;
        }

        /* Exit fullscreen button */
        .exit-fullscreen-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: #f44336;
            color: white;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 700;
            z-index: 10000;
            transition: all 0.2s ease;
        }
        .exit-fullscreen-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 12px rgba(244, 67, 54, 0.3);
        }

        @media (max-width: 768px) {
            .fullscreen-mode .game-board {
                max-width: min(80vmin, 300px) !important;
                width: min(80vmin, 300px) !important;
            }
            
            .fullscreen-mode .cell {
                font-size: min(10vmin, 3rem) !important;
            }
            
            .fullscreen-mode .game-info {
                margin: 0.5rem 0 !important;
                padding: 0.75rem !important;
            }
            
            .fullscreen-mode .controls {
                gap: 0.5rem !important;
                margin: 0.5rem 0 !important;
            }
        }
    </style>
</head>

    <div class="container">
        <div class="tool-header">

            <h1>⭕ Tic Tac Toe</h1>

        <div class="game-container" style="position: relative">
            <button class="fullscreen-btn" id="fullscreenBtn" title="Enter Fullscreen">⛶</button>
            
            <div style="display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin: 1rem 0;">

                    <span style="color: var(--muted); margin-right: 0.5rem;">Mode:</span>

                    <button class="difficulty-btn active" data-difficulty="easy">Easy</button>
                    <button class="difficulty-btn" data-difficulty="medium">Medium</button>
                    <button class="difficulty-btn" data-difficulty="hard">Hard</button>
                </div>
            </div>

            <div class="game-info">
                <div class="score">
                    <div class="score-item">
                        <div class="score-value" id="player-score">0</div>
                        <div class="score-label" id="player-label">You (X)</div>
                    </div>
                    <div class="score-item">
                        <div class="score-value" id="ai-score">0</div>

                <div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div>
                <div class="cell" data-index="4"></div>
                <div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div>
                <div class="cell" data-index="7"></div>
                <div class="cell" data-index="8"></div>
            </div>

            <div class="controls">
                <button class="btn-game" id="new-game">New Game</button>
                <button class="btn-game btn-secondary" id="reset-scores">Reset Scores</button>
            </div>
        </div>

    <script>
        class TicTacToe {
            constructor() {
                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;
                this.difficulty = 'easy';
                this.gameMode = 'ai'; // 'ai' or 'local'
                this.playerScore = 0;
                this.aiScore = 0;
                this.winningCombos = [
                    [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
                    [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
                    [0, 4, 8], [2, 4, 6] // Diagonals
                ];

                this.initializeGame();
            }

            initializeGame() {
                this.loadScores();
                this.setupEventListeners();
                this.updateDisplay();
            }

            setupEventListeners() {
                document.querySelectorAll('.cell').forEach(cell => {
                    cell.addEventListener('click', (e) => {
                        const index = parseInt(e.target.dataset.index);
                        this.makeMove(index);
                    });
                });

                document.getElementById('new-game').addEventListener('click', () => {
                    this.resetGame();
                });

                document.getElementById('reset-scores').addEventListener('click', () => {
                    this.resetScores();
                });

                document.querySelectorAll('.difficulty-btn[data-difficulty]').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        this.setDifficulty(e.target.dataset.difficulty);
                    });
                });

                document.getElementById('mode-ai').addEventListener('click', () => {
                    this.setGameMode('ai');
                });
                document.getElementById('mode-local').addEventListener('click', () => {
                    this.setGameMode('local');
                });
            }

            setDifficulty(level) {
                this.difficulty = level;
                document.querySelectorAll('.difficulty-btn[data-difficulty]').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                this.resetGame();
            }

            setGameMode(mode) {
                this.gameMode = mode;
                document.getElementById('mode-ai').classList.toggle('active', mode === 'ai');
                document.getElementById('mode-local').classList.toggle('active', mode === 'local');
                
                const diffWrapper = document.getElementById('difficulty-wrapper');
                if (diffWrapper) {
                    diffWrapper.style.display = mode === 'ai' ? 'inline-block' : 'none';
                }

                document.getElementById('player-label').textContent = mode === 'ai' ? 'You (X)' : 'Player 1 (X)';
                document.getElementById('ai-label').textContent = mode === 'ai' ? 'AI (O)' : 'Player 2 (O)';

                this.resetScores();
                this.resetGame();
            }

            makeMove(index) {
                if (!this.gameActive || this.board[index] !== '') return;

                this.board[index] = this.currentPlayer;
                this.updateCell(index);

                if (this.checkWin()) {
                    this.endGame();
                    return;
                }

                if (this.checkDraw()) {
                    this.endGame(true);
                    return;
                }

                this.currentPlayer = this.currentPlayer === 'X' ? 'O' : 'X';
                this.updateDisplay();

                if (this.gameMode === 'ai' && this.currentPlayer === 'O') {
                    setTimeout(() => this.makeAIMove(), 500);
                }
            }

            makeAIMove() {
                if (!this.gameActive) return;

                let move;
                switch (this.difficulty) {
                    case 'easy':
                        move = this.getRandomMove();
                        break;
                    case 'medium':
                        move = Math.random() < 0.5 ? this.getBestMove() : this.getRandomMove();
                        break;
                    case 'hard':
                        move = this.getBestMove();
                        break;
                }

                this.makeMove(move);
            }

            getRandomMove() {
                const availableMoves = this.board.map((cell, index) => cell === '' ? index : -1).filter(index => index !== -1);
                return availableMoves[Math.floor(Math.random() * availableMoves.length)];
            }

            getBestMove() {
                let bestScore = -Infinity;
                let bestMove = 0;

                for (let i = 0; i < 9; i++) {
                    if (this.board[i] === '') {
                        this.board[i] = 'O';
                        let score = this.minimax(this.board, 0, false);
                        this.board[i] = '';
                        if (score > bestScore) {
                            bestScore = score;
                            bestMove = i;
                        }
                    }
                }

                return bestMove;
            }

            minimax(board, depth, isMaximizing) {
                if (this.checkWin()) {
                    return isMaximizing ? -1 : 1;
                }
                if (this.checkDraw()) {
                    return 0;
                }

                if (isMaximizing) {
                    let bestScore = -Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === '') {
                            board[i] = 'O';
                            let score = this.minimax(board, depth + 1, false);
                            board[i] = '';
                            bestScore = Math.max(score, bestScore);
                        }
                    }
                    return bestScore;
                } else {
                    let bestScore = Infinity;
                    for (let i = 0; i < 9; i++) {
                        if (board[i] === '') {
                            board[i] = 'X';
                            let score = this.minimax(board, depth + 1, true);
                            board[i] = '';
                            bestScore = Math.min(score, bestScore);
                        }
                    }
                    return bestScore;
                }
            }

            checkWin() {
                for (let combo of this.winningCombos) {
                    const [a, b, c] = combo;
                    if (this.board[a] && this.board[a] === this.board[b] && this.board[a] === this.board[c]) {
                        this.highlightWinningCells(combo);
                        return true;
                    }
                }
                return false;
            }

            checkDraw() {
                return this.board.every(cell => cell !== '');
            }

            highlightWinningCells(combo) {
                combo.forEach(index => {
                    document.querySelector(`[data-index="${index}"]`).classList.add('winning');
                });
            }

            endGame(isDraw = false) {
                this.gameActive = false;

                if (isDraw) {
                    document.getElementById('game-status').textContent = "It's a draw!";
                } else {
                    if (this.currentPlayer === 'X') {
                        this.playerScore++;
                        document.getElementById('game-status').textContent = this.gameMode === 'ai' ? 'You win! 🎉' : 'Player 1 wins! 🎉';
                    } else {
                        this.aiScore++;
                        document.getElementById('game-status').textContent = this.gameMode === 'ai' ? 'AI wins! 🤖' : 'Player 2 wins! 🎉';
                    }
                    this.updateScores();
                }
            }

            resetGame() {
                this.board = Array(9).fill('');
                this.currentPlayer = 'X';
                this.gameActive = true;

                document.querySelectorAll('.cell').forEach(cell => {
                    cell.textContent = '';
                    cell.classList.remove('x', 'o', 'winning');
                });

                if (this.gameMode === 'ai') {
                    document.getElementById('game-status').textContent = 'Your turn!';
                } else {
                    document.getElementById('game-status').textContent = 'Player 1\'s turn (X)';
                }
            }

            updateCell(index) {
                const cell = document.querySelector(`[data-index="${index}"]`);
                cell.textContent = this.board[index];
                cell.classList.add(this.board[index].toLowerCase());
            }

            updateDisplay() {
                if (this.gameMode === 'ai') {
                    document.getElementById('game-status').textContent =
                        this.currentPlayer === 'X' ? 'Your turn!' : 'AI is thinking...';
                } else {
                    document.getElementById('game-status').textContent =
                        this.currentPlayer === 'X' ? 'Player 1\'s turn (X)' : 'Player 2\'s turn (O)';
                }
            }

            updateScores() {
                document.getElementById('player-score').textContent = this.playerScore;
                document.getElementById('ai-score').textContent = this.aiScore;
                this.saveScores();
            }

            resetScores() {
                this.playerScore = 0;
                this.aiScore = 0;
                this.updateScores();
            }

            saveScores() {
                localStorage.setItem(`tictactoe-scores-${this.gameMode}`, JSON.stringify({
                    player: this.playerScore,
                    ai: this.aiScore
                }));
            }

            loadScores() {
                const saved = localStorage.getItem(`tictactoe-scores-${this.gameMode}`);
                if (saved) {
                    const scores = JSON.parse(saved);
                    this.playerScore = scores.player || 0;
                    this.aiScore = scores.ai || 0;
                } else {
                    this.playerScore = 0;
                    this.aiScore = 0;
                }
            }
        }

        // Initialize game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new TicTacToe();
        });

        // Fullscreen functionality
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        let isFullscreen = false;
        let exitFullscreenBtn = null;

        function enterFullscreen() {
            isFullscreen = true;
            document.body.classList.add('fullscreen-mode');
            
            // Create exit button
            exitFullscreenBtn = document.createElement('button');
            exitFullscreenBtn.className = 'exit-fullscreen-btn';
            exitFullscreenBtn.innerHTML = '✕ Exit Fullscreen';
            exitFullscreenBtn.onclick = exitFullscreen;
            document.body.appendChild(exitFullscreenBtn);
            
            fullscreenBtn.style.display = 'none';
        }

        function exitFullscreen() {
            isFullscreen = false;
            document.body.classList.remove('fullscreen-mode');
            
            // Remove exit button
            if (exitFullscreenBtn) {
                exitFullscreenBtn.remove();
                exitFullscreenBtn = null;
            }
            
            fullscreenBtn.style.display = 'block';
        }

        fullscreenBtn.addEventListener('click', enterFullscreen);

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (isFullscreen) {
                    exitFullscreen();
                } else {
                    window.location.href = '/games';
                }
            }
        });
    </script>
