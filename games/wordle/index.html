  <main id="main" class="wrap">
  <div class="game-wrap">
    <div class="tool-header"><button class="back-btn" onclick="location.href='/games/'">← Games</button><h1 class="h1">🔤 Wordle</h1><span class="badge">6 guesses</span></div>
    <p class="muted">Guess the 5-letter word. Green = right letter & spot, yellow = right letter wrong spot, gray = not in word.</p>
    <div class="panel center">
      <div id="wdBoard" class="grid-board" style="grid-template-columns:repeat(5,1fr);max-width:320px"></div>
      <input id="wdInput" maxlength="5" autocomplete="off" spellcheck="false" placeholder="type a word + Enter" style="margin-top:12px;text-align:center;text-transform:uppercase;font-size:1.2rem;padding:10px;border-radius:10px;border:1px solid var(--cardBorder);background:#0d1626;color:var(--text);width:100%;max-width:320px;letter-spacing:4px" />
    </div>
    <div class="stats">
      <div class="stat"><b id="wdTries">–</b><span>This game</span></div>
      <div class="stat"><b id="wdPlayed">0</b><span>Played</span></div>
      <div class="stat"><b id="wdWins">0</b><span>Wins</span></div>
    </div>
    <p class="muted center" id="wdMsg"></p>
  </div>
  <script>
  (()=>{
    const WORDS=['apple','brain','crane','dream','eagle','flame','grape','heart','ivory','juice','knock','lemon','money','night','ocean','peace','queen','river','stone','tiger','ultra','vivid','water','xenon','yield','zebra','smile','cloud','light','train'];
    const ANS=['crane','flame','stone','tiger','river','ocean','smile','light','train','dream','heart','money','night','peace','queen'];
    const board=document.getElementById('wdBoard'),inp=document.getElementById('wdInput');
    let answer=ANS[Math.floor(Math.random()*ANS.length)],row=0,won=false;
    let played=+localStorage.getItem('wd_played')||0, wins=+localStorage.getItem('wd_wins')||0;
    document.getElementById('wdPlayed').textContent=played;document.getElementById('wdWins').textContent=wins;
    function newRow(){const r=document.createElement('div');r.style.display='contents';for(let i=0;i<5;i++){const c=document.createElement('div');c.className='cell';c.style.fontSize='1.4rem';r.appendChild(c);}board.appendChild(r);}
    for(let i=0;i<6;i++)newRow();
    function color(guess){const res=Array(5).fill('gray');const a=answer.split('');const g=guess.split('');const used=[false,false,false,false,false];
      for(let i=0;i<5;i++)if(g[i]===a[i]){res[i]='green';used[i]=true;}
      for(let i=0;i<5;i++)if(res[i]!=='green'){for(let j=0;j<5;j++)if(!used[j]&&g[i]===a[j]){res[i]='yellow';used[j]=true;break;}}
      return res;}
    inp.addEventListener('keydown',e=>{
      if(won||row>=6)return;
      if(e.key==='Enter'){const v=inp.value.toLowerCase();if(v.length!==5){msg('5 letters required.');return;}if(!WORDS.includes(v)&&!ANS.includes(v)){msg('Not in word list.');return;}
        const cells=board.children[row].children;const res=color(v);
        for(let i=0;i<5;i++){cells[i].textContent=v[i];cells[i].style.background=res[i]==='green'?'#15803d':res[i]==='yellow'?'#ca8a04':'#334155';}
        row++;inp.value='';
        if(v===answer){won=true;played++;wins++;localStorage.setItem('wd_played',played);localStorage.setItem('wd_wins',wins);document.getElementById('wdPlayed').textContent=played;document.getElementById('wdWins').textContent=wins;document.getElementById('wdTries').textContent=row;msg('You got it in '+row+'! The word was '+answer+'.');return;}
        if(row>=6){played++;localStorage.setItem('wd_played',played);document.getElementById('wdPlayed').textContent=played;document.getElementById('wdTries').textContent='–';msg('Out of guesses! The word was '+answer+'.');}
      }
    });
    function msg(t){document.getElementById('wdMsg').textContent=t;}
    inp.focus();
  })();
  </script>
