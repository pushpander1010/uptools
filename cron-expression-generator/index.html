  <style>
    .tool-wrap { max-width: 900px; margin: 0 auto; padding: 12px; }
    .tool-card { background: #0d1626; border: 1px solid #212a3a; border-radius: .75rem; padding: 1.25rem; margin-bottom: 16px; }
    .btn { background: #6366f1; color: white; border: none; padding: .6rem 1.2rem; border-radius: .5rem; cursor: pointer; font-size: 1rem; font-weight: 600; }
    .btn:hover { background: #4f46e5; }
    .input { width: 100%; background: #0e1628; border: 1px solid #212a3a; border-radius: .5rem; color: #e6edf3; padding: .6rem .8rem; font-size: 1rem; box-sizing: border-box; }
    .output-box { background: #0d1626; border: 1px solid #212a3a; border-radius: .75rem; padding: 1.25rem; min-height: 200px; white-space: pre-wrap; line-height: 1.6; font-size: .95rem; color: #e6edf3; max-height: 60vh; overflow-y: auto; }

<body>
  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">⏰ Cron Expression Generator - Build Cron Jobs</h1>
    <p class="note" style="margin-bottom:16px">Generate cron expressions with visual builder and presets.</p>
    
<section class="tool-card">
  <div class="grid" style="grid-template-columns:repeat(5,1fr)">
    <div><label class="note">Min</label><input class="input" id="m" value="*" oninput="upd()"></div>
    <div><label class="note">Hour</label><input class="input" id="h" value="*" oninput="upd()"></div>
    <div><label class="note">Day</label><input class="input" id="d" value="*" oninput="upd()"></div>
    <div><label class="note">Month</label><input class="input" id="mo" value="*" oninput="upd()"></div>
    <div><label class="note">Weekday</label><input class="input" id="w" value="*" oninput="upd()"></div>
  </div>
  <div style="font-size:1.5rem;font-weight:700;color:#6366f1;text-align:center;margin:16px 0;font-family:monospace" id="expr">* * * * *</div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Quick Presets</h2><div class="row" style="flex-wrap:wrap">
  <button class="btn" style="background:#374151;font-size:.8rem" onclick="p('0 * * * *')">Every hour</button>
  <button class="btn" style="background:#374151;font-size:.8rem" onclick="p('0 0 * * *')">Daily midnight</button>
  <button class="btn" style="background:#374151;font-size:.8rem" onclick="p('0 9 * * 1-5')">Weekdays 9am</button>
  <button class="btn" style="background:#374151;font-size:.8rem" onclick="p('*/5 * * * *')">Every 5 min</button>
  <button class="btn" style="background:#374151;font-size:.8rem" onclick="p('0 0 * * 0')">Weekly Sunday</button>
  <button class="btn" style="background:#374151;font-size:.8rem" onclick="p('0 0 1 * *')">Monthly 1st</button>
</div></section>
<script>
function upd(){document.getElementById('expr').textContent=['m','h','d','mo','w'].map(f=>document.getElementById(f).value).join(' ');}
function p(v){const p=v.split(' ');['m','h','d','mo','w'].forEach((f,i)=>document.getElementById(f).value=p[i]);upd();}
</script>
    <footer style="margin-top:24px;padding:16px 0;text-align:center;border-top:1px solid #212a3a">
      <p class="note">© <span id="y"></span> UpTools. Privacy-first utilities.</p>
    </footer>
  </main>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
