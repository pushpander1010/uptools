</header><main id="main" class="wrap" role="main"><nav class="note small" aria-label="Breadcrumb"><a href="/">Home</a> / <span>Calculadora de facturas</span></nav><section class="card hero" aria-labelledby="title"><div><h1 id="title">Calculadora de facturas</h1><p class="note">Calcula el total de una factura para servicios, productos o suscripciones con descuento e impuestos.</p><p class="note small" style="margin-top:10px">Idiomas: <a href="/invoice-calculator/">English</a> . <a href="/de/invoice-calculator/">Deutsch</a> . <a href="/fr/invoice-calculator/">Français</a></p></div></section><section class="grid" style="margin-top:16px"><section class="panel"><h2 style="margin-top:0">Datos</h2><div class="field"><label class="label" for="qty">Cantidad</label><input id="qty" class="input" type="number" value="10" min="0" step="0.01" /></div><div class="field"><label class="label" for="rate">Tarifa por unidad</label><input id="rate" class="input" type="number" value="75" min="0" step="0.01" /></div><div class="field"><label class="label" for="discount">Descuento %</label><input id="discount" class="input" type="number" value="10" min="0" max="100" step="0.01" /></div><div class="field"><label class="label" for="tax">Impuestos %</label><input id="tax" class="input" type="number" value="20" min="0" step="0.01" /></div></section><section class="panel"><h2 style="margin-top:0">Resultado</h2><div class="result" id="result" aria-live="polite"></div></section></section><footer class="note small site-footer" role="contentinfo">&copy; <span id="y"></span> UpTools</footer></main><script type="module">import { $, $$ } from "/scripts/utils.js"; const fmt=(v)=>new Intl.NumberFormat("es-ES",{maximumFractionDigits:2}).format(v); function calc(){const qty=Number($("#qty").value||0);const rate=Number($("#rate").value||0);const discount=Number($("#discount").value||0);const tax=Number($("#tax").value||0);const subtotal=qty*rate;const discountAmount=subtotal*(discount/100);const afterDiscount=subtotal-discountAmount;const taxAmount=afterDiscount*(tax/100);const total=afterDiscount+taxAmount;$("#result").innerHTML=`<div><strong>Subtotal:</strong> ${fmt(subtotal)}</div><div class="note small" style="margin-top:6px"><strong>Descuento:</strong> ${fmt(discountAmount)}</div><div class="note small" style="margin-top:6px"><strong>Impuestos:</strong> ${fmt(taxAmount)}</div><div class="note small" style="margin-top:6px"><strong>Total:</strong> ${fmt(total)}</div>`;} $$("input").forEach((el)=>el.addEventListener("input",calc)); $("#y").textContent=new Date().getFullYear(); calc();</script><script src="/scripts/utils.js" type="module"></script></body></html>
