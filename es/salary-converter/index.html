  <script type="module">import { $, $$ } from "/scripts/utils.js"; const fmt=(v)=>new Intl.NumberFormat("es-ES",{maximumFractionDigits:2}).format(v); function calculate(){const amount=Number($("#amount").value||0);const period=$("#period").value;const hoursPerDay=Number($("#hoursPerDay").value||0);const daysPerWeek=Number($("#daysPerWeek").value||0);const weeksPerYear=Number($("#weeksPerYear").value||0);if(amount<0||hoursPerDay<=0||daysPerWeek<=0||weeksPerYear<=0){$("#results").innerHTML='<div class="result-box">Introduce valores de trabajo positivos.</div>';return;}const hoursPerWeek=hoursPerDay*daysPerWeek;const annualHours=hoursPerWeek*weeksPerYear;const annual=period==="hourly"?amount*annualHours:period==="daily"?amount*daysPerWeek*weeksPerYear:period==="weekly"?amount*weeksPerYear:period==="monthly"?amount*12:amount;const hourly=annualHours>0?annual/annualHours:0;const daily=hourly*hoursPerDay;const weekly=daily*daysPerWeek;const monthly=annual/12;const rows=[["Hora",hourly],["Día",daily],["Semana",weekly],["Mes",monthly],["Año",annual]];$("#results").innerHTML=rows.map(([l,v])=>`<div class="result-box"><strong>${l}</strong><div style="margin-top:8px;font-size:1.2rem">${fmt(v)}</div></div>`).join("");} $$("input, select").forEach((el)=>el.addEventListener("input",calculate)); $("#y").textContent=new Date().getFullYear(); calculate();</script>
