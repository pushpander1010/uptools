<body style="--accent:#cce5ff;--bg1:#0b1420;--bg2:#0e1e30;--cardBorder:#2a4766">
  <ins class="adsbygoogle"
       style="display:inline-block;width:500px;height:50px"

       data-ad-slot="9810172647"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});

  <header class="site" role="banner">
    <div class="header-inner">
      <a class="brand" href="/" aria-label="UpTools Home">
        <img src="/assets/logo/uptools-logo.svg" alt="UpTools logo" width="28" height="28" loading="eager">
        <b>UpTools</b>
      </a>
      <nav class="nav-links" aria-label="Primary">

        <a href="/currency-converter/">Currency</a>
        <a href="/bmi-calculator/">BMI</a>
        <a aria-current="page" href="/unit-converter/">Units</a>
      </nav>
    </div>
  </header>
  <main class="wrap">
    <div class="tool-header">
      <div class="tool-icon">↔</div>
      <h1 style="margin:0">Unit Converter</h1>
    </div>
    <div class="card">
      <label class="label" for="type">Type</label>
      <select id="type" class="input">
        <option value="length">Length</option>
        <option value="weight">Weight</option>
        <option value="temp">Temperature</option>
      </select>

      <label class="label" for="val">Value</label>
      <input id="val" class="input" type="number" step="0.01" placeholder="e.g., 100" />

      <label class="label" for="from">From</label>
      <select id="from" class="input"></select>
      <label class="label" for="to">To</label>
      <select id="to" class="input"></select>

      <button id="go" class="btn">Convert</button>
      <div id="out" class="result"></div>
    </div>

    <section class="card" style="margin-top:12px">
      <h2 style="margin-top:0">Quick explainer 🎥</h2>
      <iframe width="100%" height="100%"
        src="https://www.youtube-nocookie.com/embed/iiADhChRriM?rel=0&modestbranding=1&playsinline=1"
        title="How units and conversions work"
        loading="lazy"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        referrerpolicy="strict-origin-when-cross-origin" allowfullscreen
        style="border:0; aspect-ratio:16/9; border-radius:.75rem; display:block; width:100%"></iframe>
      <p class="note small" style="margin-top:6px">Video: Metric vs imperial unit conversion explained.</p>
    </section>

    <footer class="note small site-footer" role="contentinfo" style="margin-top:12px">
      © <span id="y"></span> UpTools . <a href="/">Home</a> . <a href="/about/">About</a> . <a href="/sitemap.xml">Sitemap</a>
    </footer>
  </main>
  <script type="module">
    const type = document.getElementById('type'), val = document.getElementById('val'), from = document.getElementById('from'), to = document.getElementById('to'), out = document.getElementById('out');
    document.getElementById('y').textContent = new Date().getFullYear();
    const units = {
      length: { m: 1, km: 1000, cm: 0.01, mm: 0.001, mi: 1609.344, ft: 0.3048, in: 0.0254 },
      weight: { kg: 1, g: 0.001, lb: 0.45359237, oz: 0.0283495231 },
      temp: ['C', 'F', 'K']
    };
    function fill() {
      const t = type.value; from.innerHTML = ''; to.innerHTML = '';
      const opts = t === 'temp' ? units.temp : Object.keys(units[t]);
      opts.forEach(u => { const o = document.createElement('option'); o.value = String(u); o.textContent = String(u); from.appendChild(o.cloneNode(true)); to.appendChild(o); });
    }
    function convert() {
      const t = type.value; const x = Number(val.value || 0); if (!isFinite(x)) { out.textContent = 'Enter a number'; return; }
      let res = 0; const f = from.value, tt = to.value;
      if (t === 'temp') {
        let c = f === 'C' ? x : f === 'F' ? (x - 32) * 5 / 9 : x - 273.15;
        res = tt === 'C' ? c : tt === 'F' ? c * 9 / 5 + 32 : c + 273.15;
      } else {
        const base = x * units[t][f]; res = base / units[t][tt];
      }
      out.innerHTML = `<div class='row'><span>Result</span><span class='amount'>${res.toFixed(4)}</span></div>`;
    }
    type.addEventListener('change', fill);
    document.getElementById('go').addEventListener('click', convert);
    [val, from, to].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') convert(); }));
    fill();
  </script>
