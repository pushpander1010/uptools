    .output-box { background: #0d1626; border: 1px solid #212a3a; border-radius: .75rem; padding: 1.25rem; min-height: 200px; white-space: pre-wrap; line-height: 1.6; font-size: .95rem; color: #e6edf3; max-height: 60vh; overflow-y: auto; }

<body>
  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">📊 Word Counter - Words Characters Sentences Reading Time</h1>
    <p class="note" style="margin-bottom:16px">Count words, characters, sentences, paragraphs, and reading time.</p>
    
<section class="tool-card">
  <textarea class="input" id="inp" rows="10" placeholder="Paste or type your text here..."></textarea>
</section>
<section class="tool-card">
  <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(130px,1fr))">
    <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:2rem;font-weight:700;color:#6366f1" id="wc">0</div><div class="note">Words</div></div>
    <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:2rem;font-weight:700;color:#22c55e" id="cc">0</div><div class="note">Characters</div></div>
    <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:2rem;font-weight:700;color:#f59e0b" id="sc">0</div><div class="note">Sentences</div></div>
    <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:2rem;font-weight:700;color:#ef4444" id="pc">0</div><div class="note">Paragraphs</div></div>
    <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:2rem;font-weight:700;color:#8b5cf6" id="rt">0</div><div class="note">Min Read</div></div>
    <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:2rem;font-weight:700;color:#06b6d4" id="awl">0</div><div class="note">Avg Word Len</div></div>
  </div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Reading Level</h2><div id="rl" class="note"></div></section>
<script>
function analyze(){const t=document.getElementById('inp').value;const w=t.trim()?t.trim().split(/\s+/):[];const s=t.split(/[.!?]+/).filter(x=>x.trim());const p=t.split(/\n\s*\n/).filter(x=>x.trim());document.getElementById('wc').textContent=w.length.toLocaleString();document.getElementById('cc').textContent=t.length.toLocaleString();document.getElementById('sc').textContent=s.length.toLocaleString();document.getElementById('pc').textContent=p.length.toLocaleString();document.getElementById('rt').textContent=Math.ceil(w.length/200);document.getElementById('awl').textContent=w.length?(w.reduce((a,b)=>a+b.length,0)/w.length).toFixed(1):0;if(!w.length){document.getElementById('rl').innerHTML='Enter text to see reading level.';return;}const syll=w.reduce((a,b)=>a+sy(b),0);const score=206.835-1.015*(w.length/s.length)-84.6*(syll/w.length);let lv='College Graduate';if(score<30)lv='Very Difficult';else if(score<50)lv='Difficult';else if(score<60)lv='Standard';else if(score<70)lv='Fairly Easy';else if(score<80)lv='Easy';else lv='Very Easy';document.getElementById('rl').innerHTML='<b>'+lv+'</b> (Score: '+score.toFixed(1)+')';}
function sy(w){w=w.toLowerCase().replace(/[^a-z]/g,'');if(w.length<=3)return 1;w=w.replace(/(?:[^laeiouy]es|ed|[^laeiouy]e)$/,'').replace(/^y/,'');const m=w.match(/[aeiouy]{1,2}/g);return m?m.length:1;}
document.getElementById('inp').addEventListener('input',analyze);analyze();
</script>
