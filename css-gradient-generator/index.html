  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">🎨 CSS Gradient Generator - Linear Radial Conic</h1>
    <p class="note" style="margin-bottom:16px">Generate CSS gradients with live preview.</p>

<section class="tool-card">
  <div class="grid">
    <div><label class="note">Type</label><select class="input" id="type" onchange="gen()"><option value="linear">Linear</option><option value="radial">Radial</option><option value="conic">Conic</option></select></div>
    <div><label class="note">Angle</label><input class="input" id="angle" type="number" value="90" min="0" max="360" oninput="gen()"></div>
  </div>
  <div style="margin-top:12px"><label class="note">Colors</label><div id="colors" class="row" style="margin-top:4px"><input type="color" value="#6366f1" class="clr" onchange="gen()" style="width:50px;height:40px;border:none;border-radius:8px"><input type="color" value="#ec4899" class="clr" onchange="gen()" style="width:50px;height:40px;border:none;border-radius:8px"></div>
  <div class="row" style="margin-top:8px"><button class="btn" style="background:#374151;font-size:.8rem" onclick="addClr()">+ Add</button></div></div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Preview</h2><div id="prev" style="height:200px;border-radius:12px"></div></section>
<section class="tool-card"><h2 style="margin-top:0">CSS</h2><div class="output-box" id="css" style="font-family:monospace;font-size:.9rem"></div><button class="btn" style="background:#374151;margin-top:8px" onclick="navigator.clipboard.writeText(document.getElementById('css').textContent)">Copy</button></section>
<script>
function gen(){const t=document.getElementById('type').value,a=document.getElementById('angle').value,s=Array.from(document.querySelectorAll('.clr')).map(e=>e.value);let c;if(t==='linear')c='background: linear-gradient('+a+'deg, '+s.join(', ')+');';else if(t==='radial')c='background: radial-gradient(circle, '+s.join(', ')+');';else c='background: conic-gradient('+s.join(', ')+');';document.getElementById('prev').style.cssText=c;document.getElementById('css').textContent=c;}
function addClr(){const i=document.createElement('input');i.type='color';i.value='#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');i.className='clr';i.style.cssText='width:50px;height:40px;border:none;border-radius:8px';i.onchange=gen;document.getElementById('colors').appendChild(i);gen();}
</script>
