async function gen(){const t=document.getElementById('inp').value;if(!t)return;const d=new TextEncoder().encode(t);let h='';for(const a of['SHA-1','SHA-256','SHA-384','SHA-512']){const b=await crypto.subtle.digest(a,d);const hex=Array.from(new Uint8Array(b)).map(b=>b.toString(16).padStart(2,'0')).join('');h+='<div style="margin-bottom:12px;padding:12px;background:#0e1628;border-radius:.5rem"><b style="color:#6366f1">'+a+'</b><div style="margin-top:4px;word-break:break-all;font-family:monospace;font-size:.85rem">'+hex+'</div><button onclick="navigator.clipboard.writeText(\''+hex+'\')" style="margin-top:4px;background:none;border:1px solid #212a3a;color:#9aa4b2;padding:4px 8px;border-radius:4px;cursor:pointer;font-size:.8rem">Copy</button></div>';}document.getElementById('out').innerHTML=h;}
</script>
