<script>
function uuid(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}
function gen(){const cnt=+document.getElementById('cnt').value||10;const fmt=document.getElementById('fmt').value;const r=[];for(let i=0;i<cnt;i++){let u=uuid();if(fmt==='none')u=u.replace(/-/g,'');else if(fmt==='upper')u=u.toUpperCase();r.push(u);}document.getElementById('out').textContent=r.join('\n');}
gen();
</script>
