<section class="tool-card">
  <div class="grid">
    <div><label class="note">Count</label><input class="input" id="cnt" type="number" value="10" min="1" max="100"></div>
    <div><label class="note">Format</label><select class="input" id="fmt"><option value="hyphen">With hyphens</option><option value="none">No hyphens</option><option value="upper">Uppercase</option></select></div>

<section class="tool-card"><h2 style="margin-top:0">UUIDs</h2><div class="output-box" id="out" style="font-family:monospace"></div><button class="btn" style="background:#374151;margin-top:8px" onclick="navigator.clipboard.writeText(document.getElementById('out').textContent)">Copy All</button></section>
<script>
function uuid(){return'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{const r=crypto.getRandomValues(new Uint8Array(1))[0]%16;return(c==='x'?r:(r&0x3|0x8)).toString(16);});}
function gen(){const cnt=+document.getElementById('cnt').value||10;const fmt=document.getElementById('fmt').value;const r=[];for(let i=0;i<cnt;i++){let u=uuid();if(fmt==='none')u=u.replace(/-/g,'');else if(fmt==='upper')u=u.toUpperCase();r.push(u);}document.getElementById('out').textContent=r.join('\n');}
gen();
</script>
