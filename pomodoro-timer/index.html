  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">🍅 Pomodoro Timer - Focus Timer Online</h1>
    <p class="note" style="margin-bottom:16px">Free Pomodoro timer with customizable focus and break intervals.</p>

<section class="tool-card" style="text-align:center">
  <div style="font-size:4rem;font-weight:700;color:#6366f1;margin:20px 0;font-variant-numeric:tabular-nums" id="timer">25:00</div>
  <p class="note" style="font-size:1.1rem" id="label">Focus Time</p>
  <div class="row" style="justify-content:center;margin-top:16px">
    <button class="btn" id="start">▶️ Start</button>
    <button class="btn" style="background:#374151" id="reset">🔄 Reset</button>
  </div>
  <div class="row" style="justify-content:center;margin-top:16px">
    <button class="btn" style="background:#22c55e;font-size:.9rem" onclick="set(25,'Focus')">🎯 25m</button>
    <button class="btn" style="background:#f59e0b;font-size:.9rem" onclick="set(5,'Short Break')">☕ 5m</button>
    <button class="btn" style="background:#ef4444;font-size:.9rem" onclick="set(15,'Long Break')">🌴 15m</button>
  </div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Sessions: <span id="cnt">0</span></h2><div id="dots" class="row" style="justify-content:center"></div></section>
<script>
let t=1500,running=false,interval,cnt=0;
function upd(){const m=Math.floor(t/60),s=t%60;document.getElementById('timer').textContent=String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');document.title=document.getElementById('timer').textContent+' - Pomodoro | UpTools';}
function set(min,lbl){clearInterval(interval);running=false;t=min*60;document.getElementById('label').textContent=lbl;document.getElementById('start').textContent='▶️ Start';upd();}
document.getElementById('start').addEventListener('click',()=>{if(running){clearInterval(interval);running=false;document.getElementById('start').textContent='▶️ Start';}else{running=true;document.getElementById('start').textContent='⏸️ Pause';interval=setInterval(()=>{t--;upd();if(t<=0){clearInterval(interval);running=false;cnt++;document.getElementById('cnt').textContent=cnt;document.getElementById('dots').innerHTML+='🍅';document.getElementById('start').textContent='▶️ Start';document.getElementById('label').textContent='Done! 🎉';if(Notification.permission==='granted')new Notification('Pomodoro',{body:'Session complete!'});}},1000);}});
document.getElementById('reset').addEventListener('click',()=>set(25,'Focus'));
if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
upd();
</script>
