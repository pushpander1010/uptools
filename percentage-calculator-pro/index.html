    <h1 style="font-size:1.5rem;margin-bottom:4px">% Percentage Calculator - 4 Modes</h1>
    <p class="note" style="margin-bottom:16px">Calculate percentages, percentage change, and increase/decrease.</p>

<section class="tool-card">
  <div style="display:flex;gap:8px;margin-bottom:12px">
    <button class="btn" style="background:#6366f1" id="t1" onclick="show(1)">% of Number</button>
    <button class="btn" style="background:#374151" id="t2" onclick="show(2)">What %</button>
    <button class="btn" style="background:#374151" id="t3" onclick="show(3)">% Change</button>
  </div>
  <div id="c1"><div class="grid"><div><label class="note">What %</label><input class="input" id="a1" type="number"></div><div><label class="note">of</label><input class="input" id="b1" type="number"></div></div><div style="font-size:1.5rem;font-weight:700;color:#6366f1;margin-top:12px" id="r1">0</div></div>
  <div id="c2" style="display:none"><div class="grid"><div><label class="note">is</label><input class="input" id="a2" type="number"></div><div><label class="note">of</label><input class="input" id="b2" type="number"></div></div><div style="font-size:1.5rem;font-weight:700;color:#6366f1;margin-top:12px" id="r2">0%</div></div>
  <div id="c3" style="display:none"><div class="grid"><div><label class="note">From</label><input class="input" id="a3" type="number"></div><div><label class="note">To</label><input class="input" id="b3" type="number"></div></div><div style="font-size:1.5rem;font-weight:700;margin-top:12px" id="r3">0%</div></div>
</section>
<script>
function show(n){[1,2,3].forEach(i=>{document.getElementById('c'+i).style.display=i===n?'block':'none';document.getElementById('t'+i).style.background=i===n?'#6366f1':'#374151';});}
function c1(){document.getElementById('r1').textContent=(+document.getElementById('a1').value/100*(+document.getElementById('b1').value)).toFixed(2);}
function c2(){document.getElementById('r2').textContent=(+document.getElementById('a2').value/(+document.getElementById('b2').value)*100).toFixed(2)+'%';}
function c3(){const d=((+document.getElementById('b3').value-(+document.getElementById('a3').value))/(+document.getElementById('a3').value)*100);document.getElementById('r3').textContent=(d>=0?'+':'')+d.toFixed(2)+'%';document.getElementById('r3').style.color=d>=0?'#22c55e':'#ef4444';}
['a1','b1'].forEach(id=>document.getElementById(id).addEventListener('input',c1));
['a2','b2'].forEach(id=>document.getElementById(id).addEventListener('input',c2));
['a3','b3'].forEach(id=>document.getElementById(id).addEventListener('input',c3));
</script>
