    <h1 style="font-size:1.5rem;margin-bottom:4px">{} JSON Formatter - Format Validate Minify JSON</h1>
    <p class="note" style="margin-bottom:16px">Format, validate, and minify JSON data instantly.</p>

<section class="tool-card">
  <textarea class="input" id="inp" rows="10" placeholder='Paste JSON here... {"key": "value"}' style="font-family:monospace;font-size:.9rem"></textarea>
  <div class="row" style="margin-top:12px">
    <button class="btn" onclick="fmt()">Format</button>
    <button class="btn" style="background:#374151" onclick="min()">Minify</button>
    <button class="btn" style="background:#374151" onclick="val()">Validate</button>
    <button class="btn" style="background:#374151" onclick="navigator.clipboard.writeText(document.getElementById('out').textContent)">Copy</button>
  </div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Output</h2><div class="output-box" id="out" style="font-family:monospace;font-size:.9rem"></div><div id="st" class="note"></div></section>
<script>
function fmt(){try{document.getElementById('out').textContent=JSON.stringify(JSON.parse(document.getElementById('inp').value),null,2);document.getElementById('st').textContent='✅ Valid';document.getElementById('st').style.color='#22c55e';}catch(e){document.getElementById('st').textContent='❌ '+e.message;document.getElementById('st').style.color='#ef4444';}}
function min(){try{document.getElementById('out').textContent=JSON.stringify(JSON.parse(document.getElementById('inp').value));document.getElementById('st').textContent='✅ Minified';document.getElementById('st').style.color='#22c55e';}catch(e){document.getElementById('st').textContent='❌ '+e.message;document.getElementById('st').style.color='#ef4444';}}
function val(){try{JSON.parse(document.getElementById('inp').value);document.getElementById('st').textContent='✅ Valid JSON';document.getElementById('st').style.color='#22c55e';}catch(e){document.getElementById('st').textContent='❌ '+e.message;document.getElementById('st').style.color='#ef4444';}}
</script>
