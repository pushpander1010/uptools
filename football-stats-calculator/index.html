<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo/uptools-logo.svg">

  <meta property="og:title" content="Football Stats Calculator - Player Performance & Team Stats | UpTools" />
  <meta property="og:description" content="Free Football Stats Calculator by UpTools. Calculate player performance metrics and team statistics." />

  <meta property="og:url" content="https://www.uptools.in/football-stats-calculator/" />
  <meta property="og:site_name" content="UpTools" />
  <meta property="og:image" content="/assets/og/football-stats-calculator.png" />

  <meta property="og:image:height" content="630" />

  <link rel="preload" href="/style.css?v=1.3.0" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="/style.css?v=1.3.0"></noscript>
  <style>
    :root{
      --bg1:#0a0b0f;
      --bg2:#0b0f1a;
      --ink:#e9ecf5;
      --muted:#a6adbb;
      --accent:#4a90e2;
      --accent-2:#357abd;
      --line:rgba(255,255,255,.10);
      --card:rgba(255,255,255,.04);
    }
    html,body{height:100%}
    body{
      color:var(--ink);
      background:
        radial-gradient(1200px 800px at 10% 5%, rgba(74,144,226,.08), transparent 55%),
        radial-gradient(900px 600px at 88% 10%, rgba(53,122,189,.06), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .wrap{ max-width:1100px; margin:0 auto; padding:24px 16px 32px; display:grid; gap:16px; }
    .grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:16px; align-items:start; }
    @media (max-width:900px){ .grid{ grid-template-columns:1fr; } }
    .card{ border:1px solid var(--line); border-radius:14px; background:var(--card); padding:1rem; }
    .tool-header{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .tool-icon{
      width:48px;height:48px;border-radius:12px;display:grid;place-items:center;font-size:24px;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 8px 24px rgba(74,144,226,.3);
    }
    h1{margin:0;font-size:1.75rem;text-shadow:0 0 10px rgba(74,144,226,.4);}
    .inputs{ display:grid; gap:12px; }
    .row{display:flex;flex-direction:column;gap:6px;}
    .label{font-weight:600;color:var(--muted);font-size:.9rem;}
    .input{
      padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.3);
      color:var(--ink);font-size:1rem;font-family:inherit;
      transition:border-color .2s,box-shadow .2s;
    }
    .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(74,144,226,.15);}
    .btn{
      padding:12px 20px;border-radius:10px;border:1px solid var(--accent);
      background:linear-gradient(135deg, rgba(74,144,226,.2), rgba(53,122,189,.15));
      color:var(--accent);font-weight:700;cursor:pointer;font-size:1rem;
      transition:transform .1s,filter .15s;
    }
    .btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
    .result{ display:grid; gap:10px; }
    .result .row{
      display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
      border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.25);
    }
    .amount{font-variant-numeric:tabular-nums;font-weight:800;font-size:1.2rem;color:var(--accent);}
    .note{color:var(--muted);font-size:.9rem;margin-top:8px;}
  </style>
</head>
<body>
  <a href="#main" class="sr-only">Skip to content</a>
  <main class="wrap" id="main" role="main">
    <div class="grid">
      <div>
        <div class="card">
          <div class="tool-header">
            <div class="tool-icon">🏈</div>
            <div>
              <h1>Football Stats Calculator</h1>
              <p class="note" style="margin:0">Calculate player performance metrics</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="inputs">
            <div class="row">
              <label class="label">Passes Completed</label>
              <input class="input" type="number" id="completed" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Passes Attempted</label>
              <input class="input" type="number" id="attempted" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Passing Yards</label>
              <input class="input" type="number" id="yards" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Touchdowns</label>
              <input class="input" type="number" id="tds" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Interceptions</label>
              <input class="input" type="number" id="ints" placeholder="0" min="0" />
            </div>
            <button class="btn" onclick="calculateStats()">Calculate</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="result" id="result" style="display:none;">
          <h3 style="margin:0 0 12px 0;color:var(--accent);">Performance Metrics</h3>
          <div id="resultContent"></div>
        </div>
        <div id="noResult" style="color:var(--muted);text-align:center;padding:20px;">
          Enter stats to calculate metrics
        </div>
      </div>
    </div>
  </main>
  <script src="/scripts/utils.js?v=1.3.0" type="module"></script>
  <script defer>
    function calculateStats() {
      const completed = parseInt(document.getElementById('completed').value) || 0;
      const attempted = parseInt(document.getElementById('attempted').value) || 0;
      const yards = parseInt(document.getElementById('yards').value) || 0;
      const tds = parseInt(document.getElementById('tds').value) || 0;
      const ints = parseInt(document.getElementById('ints').value) || 0;

      if (attempted === 0) {
        alert('Please enter attempts');
        return;
      }

      const completionPct = ((completed / attempted) * 100).toFixed(1);
      const yardsPerAttempt = (yards / attempted).toFixed(2);
      const yardsPerCompletion = completed > 0 ? (yards / completed).toFixed(2) : 0;
      const tdInt = tds - ints;

      // NFL Passer Rating Formula
      let a = Math.max(0, Math.min(2.375, (completed / attempted - 0.3) * 12.5));
      let b = Math.max(0, Math.min(2.375, (yards / attempted - 3) * 0.25));
      let c = Math.max(0, Math.min(2.375, (tds / attempted) * 20));
      let d = Math.max(0, Math.min(2.375, 2.375 - (ints / attempted) * 25));
      let rating = ((a + b + c + d) / 6 * 100).toFixed(1);

      const resultContent = document.getElementById('resultContent');
      resultContent.innerHTML = `
        <div class="row"><span>Completion %</span><span class="amount">${completionPct}%</span></div>
        <div class="row"><span>Yards/Attempt</span><span class="amount">${yardsPerAttempt}</span></div>
        <div class="row"><span>Yards/Completion</span><span class="amount">${yardsPerCompletion}</span></div>
        <div class="row"><span>TD-INT Ratio</span><span class="amount">${tdInt}</span></div>
        <div class="row"><span>Passer Rating</span><span class="amount">${rating}</span></div>
      `;

      document.getElementById('result').style.display = 'block';
      document.getElementById('noResult').style.display = 'none';
    }

    document.getElementById('attempted').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') calculateStats();
    });
  </script>
</body>
</html>
