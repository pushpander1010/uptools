  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">💰 Tip Calculator - Calculate Tips and Split Bills</h1>
    <p class="note" style="margin-bottom:16px">Calculate tips, total, and per-person amount.</p>

<section class="tool-card">
  <div class="grid">
    <div><label class="note">Bill Amount ($)</label><input class="input" id="bill" type="number" placeholder="0.00" oninput="calc()" style="font-size:1.2rem"></div>
    <div><label class="note">Tip %</label><input class="input" id="tip" type="number" value="15" oninput="calc()" style="font-size:1.2rem"></div>
    <div><label class="note">Split Between</label><input class="input" id="split" type="number" value="1" min="1" oninput="calc()" style="font-size:1.2rem"></div>
  </div>
  <div class="row" style="margin-top:8px"><button class="btn" style="background:#374151;font-size:.8rem" onclick="document.getElementById('tip').value=10;calc()">10%</button><button class="btn" style="background:#374151;font-size:.8rem" onclick="document.getElementById('tip').value=15;calc()">15%</button><button class="btn" style="background:#374151;font-size:.8rem" onclick="document.getElementById('tip').value=20;calc()">20%</button><button class="btn" style="background:#374151;font-size:.8rem" onclick="document.getElementById('tip').value=25;calc()">25%</button></div>
</section>
<section class="tool-card"><div class="grid" style="grid-template-columns:repeat(3,1fr)">
  <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:1.5rem;font-weight:700;color:#22c55e" id="tipAmt">$0.00</div><div class="note">Tip</div></div>
  <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:1.5rem;font-weight:700;color:#6366f1" id="total">$0.00</div><div class="note">Total</div></div>
  <div style="text-align:center;padding:16px;background:#0e1628;border-radius:.5rem"><div style="font-size:1.5rem;font-weight:700;color:#f59e0b" id="per">$0.00</div><div class="note">Per Person</div></div>
</div></section>
<script>
function calc(){const b=+document.getElementById('bill').value||0,t=+document.getElementById('tip').value||0,s=+document.getElementById('split').value||1;const ta=b*t/100,tl=b+ta,pp=tl/s;document.getElementById('tipAmt').textContent='$'+ta.toFixed(2);document.getElementById('total').textContent='$'+tl.toFixed(2);document.getElementById('per').textContent='$'+pp.toFixed(2);}
</script>
