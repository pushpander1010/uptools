  <style>
    .tool-wrap { max-width: 900px; margin: 0 auto; padding: 12px; }
    .tool-card { background: #0d1626; border: 1px solid #212a3a; border-radius: .75rem; padding: 1.25rem; margin-bottom: 16px; }
    .btn { background: #6366f1; color: white; border: none; padding: .6rem 1.2rem; border-radius: .5rem; cursor: pointer; font-size: 1rem; font-weight: 600; }
    .btn:hover { background: #4f46e5; }
    .input { width: 100%; background: #0e1628; border: 1px solid #212a3a; border-radius: .5rem; color: #e6edf3; padding: .6rem .8rem; font-size: 1rem; box-sizing: border-box; }
    .output-box { background: #0d1626; border: 1px solid #212a3a; border-radius: .75rem; padding: 1.25rem; min-height: 200px; white-space: pre-wrap; line-height: 1.6; font-size: .95rem; color: #e6edf3; max-height: 60vh; overflow-y: auto; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }

<body>
  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">🔤 String Builder - Transform Text Online</h1>
    <p class="note" style="margin-bottom:16px">Transform text: uppercase, lowercase, title case, slug, camelCase, snake_case.</p>
    
<section class="tool-card">
  <textarea class="input" id="inp" rows="6" placeholder="Enter text..."></textarea>
  <div class="row" style="margin-top:12px;flex-wrap:wrap">
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('upper')">UPPER</button>
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('lower')">lower</button>
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('title')">Title</button>
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('slug')">slug-case</button>
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('camel')">camelCase</button>
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('snake')">snake_case</button>
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('reverse')">esreveR</button>
    <button class="btn" style="background:#374151;font-size:.85rem" onclick="t('trim')">Trim</button>
  </div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Result</h2><div class="output-box" id="out"></div><button class="btn" style="background:#374151;margin-top:8px" onclick="navigator.clipboard.writeText(document.getElementById('out').textContent)">Copy</button></section>
<script>
function t(m){const i=document.getElementById('inp').value;let r='';switch(m){case'upper':r=i.toUpperCase();break;case'lower':r=i.toLowerCase();break;case'title':r=i.replace(/\b\w/g,c=>c.toUpperCase());break;case'slug':r=i.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');break;case'camel':r=i.replace(/[^a-zA-Z0-9]+(.)/g,(_,c)=>c.toUpperCase());break;case'snake':r=i.replace(/([A-Z])/g,'_$1').toLowerCase().replace(/[^a-z0-9_]/g,'_');break;case'reverse':r=i.split('').reverse().join('');break;case'trim':r=i.replace(/\s+/g,' ').trim();break;}document.getElementById('out').textContent=r;}
</script>
    <footer style="margin-top:24px;padding:16px 0;text-align:center;border-top:1px solid #212a3a">
      <p class="note">© <span id="y"></span> UpTools. Privacy-first utilities.</p>
    </footer>
  </main>
  <script>document.getElementById('y').textContent = new Date().getFullYear();</script>
