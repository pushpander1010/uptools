<section class="tool-card"><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
<div><label class="note">Markdown</label><textarea class="input" id="md" rows="15" oninput="render()" style="font-family:monospace;font-size:.85rem"># Hello\n\nThis is **bold** and *italic*.\n\n- Item 1\n- Item 2\n\n> Blockquote\n\n```js\nconsole.log("Hi");\n```</textarea></div>

</div></section>
<script>
function render(){let h=document.getElementById('md').value.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/^### (.+)$/gm,'<h3>$1</h3>').replace(/^## (.+)$/gm,'<h2>$1</h2>').replace(/^# (.+)$/gm,'<h1>$1</h1>').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>').replace(/\*(.+?)\*/g,'<i>$1</i>').replace(/`(.+?)`/g,'<code style="background:#1e1b4b;padding:2px 6px;border-radius:4px">$1</code>').replace(/^\- (.+)$/gm,'<li>$1</li>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');document.getElementById('prev').innerHTML=h;}
render();
</script>
