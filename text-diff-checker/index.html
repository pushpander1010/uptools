  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">🔍 Text Diff Checker - Compare Text Differences</h1>
    <p class="note" style="margin-bottom:16px">Compare two texts side by side with highlighted differences.</p>

<section class="tool-card"><div class="grid">
<div><label class="note">Original</label><textarea class="input" id="t1" rows="10" style="font-family:monospace;font-size:.85rem"></textarea></div>
<div><label class="note">Modified</label><textarea class="input" id="t2" rows="10" style="font-family:monospace;font-size:.85rem"></textarea></div>
</div>
<div class="row" style="margin-top:12px"><button class="btn" onclick="diff()">Compare</button><button class="btn" style="background:#374151" onclick="document.getElementById('t1').value=document.getElementById('t2').value;document.getElementById('t2').value=''">Swap</button></div></section>
<section class="tool-card"><h2 style="margin-top:0">Differences</h2><div id="stats" class="note"></div><div class="output-box" id="out" style="font-family:monospace;font-size:.85rem;white-space:pre-wrap"></div></section>
<script>
function diff(){const a=document.getElementById('t1').value.split('\n'),b=document.getElementById('t2').value.split('\n');let h='',add=0,rem=0;const mx=Math.max(a.length,b.length);for(let i=0;i<mx;i++){if(a[i]===b[i]){h+='<span style="color:#9aa4b2">  '+(a[i]||'')+'</span>\n';}else{if(a[i]!==undefined){h+='<span style="color:#ef4444;background:rgba(239,68,68,.15)">- '+a[i]+'</span>\n';rem++;}if(b[i]!==undefined){h+='<span style="color:#22c55e;background:rgba(34,197,94,.15)">+ '+b[i]+'</span>\n';add++;}}}document.getElementById('out').innerHTML=h;document.getElementById('stats').innerHTML='<span style="color:#22c55e">+'+add+'</span> | <span style="color:#ef4444">-'+rem+'</span>';}
</script>
