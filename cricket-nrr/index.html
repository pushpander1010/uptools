        <div class="row">

        </div>
        <div class="row">

  <script type="module" src="/scripts/utils.js" defer></script>
  <script type="module">
    const $ = id => document.getElementById(id);
    const ourRunsIn = $('ourRuns'), ourOversIn = $('ourOvers'), oppRunsIn = $('oppRuns');
    const tableBody = $('tableBody'), summary = $('summary');
    $('yr').textContent = new Date().getFullYear();

    let matches = [];

    function ballsToOvers(b) { return Math.floor(b / 6) + (b % 6) / 10; }

    function addMatch() {
      const ourRuns = parseInt(ourRunsIn.value) || 0;
      let ourOvers = parseFloat(ourOversIn.value) || 0;
      const oppRuns = parseInt(oppRunsIn.value) || 0;

      if (ourRuns <= 0 || ourOvers <= 0 || oppRuns < 0) {
        alert('Enter valid match values'); return;
      }

      const ourRR = ourRuns / ourOvers;
      const oppRR = oppRuns / 20;
      const nrr = ourRR - oppRR;

      matches.push({ ourRuns, ourOvers, oppRuns, ourRR, oppRR, nrr });
      renderTable();
    }

    function renderTable() {
      if (!matches.length) {
        tableBody.innerHTML = '<tr><td colspan="5" class="note">Add matches above to calculate NRR</td></tr>';
        summary.innerHTML = ''; return;
      }

      let rows = matches.map((m, i) => {
        const nrrClass = m.nrr >= 0 ? 'pos' : 'neg';
        return `<tr>
          <td class="pos">${i + 1}</td>
          <td>${m.ourRuns} / ${ballsToOvers(m.ourOvers * 6)} ov vs ${m.oppRuns}</td>
          <td>${m.ourRR.toFixed(2)}</td>
          <td>${m.oppRR.toFixed(2)}</td>
          <td class="nrr ${nrrClass}">${m.nrr >= 0 ? '+' : ''}${m.nrr.toFixed(2)}</td>
        </tr>`;
      }).join('');

      tableBody.innerHTML = rows;

      const avgNRR = matches.reduce((a, m) => a + m.nrr, 0) / matches.length;
      const avgOurRR = matches.reduce((a, m) => a + m.ourRR, 0) / matches.length;
      const avgOppRR = matches.reduce((a, m) => a + m.oppRR, 0) / matches.length;
      const totalRuns = matches.reduce((a, m) => a + m.ourRuns, 0);
      const totalOvers = matches.reduce((a, m) => a + m.ourOvers, 0);
      const totalRunsAgainst = matches.reduce((a, m) => a + m.oppRuns, 0);

      summary.innerHTML = `
        <div class="row"><span>Matches Played</span><span class="highlight">${matches.length}</span></div>
        <div class="row"><span>Total Runs Scored</span><span class="highlight">${totalRuns}</span></div>
        <div class="row"><span>Overs Used</span><span class="highlight">${totalOvers.toFixed(1)}</span></div>
        <div class="row"><span>Runs Conceded</span><span class="highlight">${totalRunsAgainst}</span></div>
        <div class="row"><span>Average Run Rate</span><span class="highlight">${avgOurRR.toFixed(2)}</span></div>
        <div class="row"><span>Opposition Avg RR</span><span class="highlight">${avgOppRR.toFixed(2)}</span></div>
        <div class="row"><span>NET RUN RATE</span><span class="highlight ${avgNRR >= 0 ? 'pos' : 'neg'}" style="font-size:1.3rem">${avgNRR >= 0 ? '+' : ''}${avgNRR.toFixed(3)}</span></div>
      `;
    }

    $('addBtn').addEventListener('click', addMatch);
    $('clearBtn').addEventListener('click', () => { matches = []; renderTable(); });
    [ourRunsIn, ourOversIn, oppRunsIn].forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') addMatch(); }));
  </script>
