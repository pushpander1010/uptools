    <h1 style="font-size:1.5rem;margin-bottom:4px">🎯 Favicon Generator - Create Favicons from Text</h1>
    <p class="note" style="margin-bottom:16px">Generate favicons from text with customizable colors.</p>

<section class="tool-card">
  <div class="grid">
    <div><label class="note">Letter/Emoji</label><input class="input" id="txt" value="A" maxlength="2" oninput="gen()" style="font-size:2rem;text-align:center"></div>
    <div><label class="note">Background</label><input type="color" id="bg" value="#6366f1" onchange="gen()" style="width:100%;height:40px;border:none;border-radius:8px"></div>
    <div><label class="note">Text Color</label><input type="color" id="fg" value="#ffffff" onchange="gen()" style="width:100%;height:40px;border:none;border-radius:8px"></div>
  </div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Generated</h2><div class="row" style="justify-content:center;gap:16px">
  <div style="text-align:center"><canvas id="c16" width="16" height="16" style="border:1px solid #212a3a;border-radius:4px"></canvas><div class="note">16</div></div>
  <div style="text-align:center"><canvas id="c32" width="32" height="32" style="border:1px solid #212a3a;border-radius:4px"></canvas><div class="note">32</div></div>
  <div style="text-align:center"><canvas id="c48" width="48" height="48" style="border:1px solid #212a3a;border-radius:4px"></canvas><div class="note">48</div></div>
  <div style="text-align:center"><canvas id="c180" width="180" height="180" style="border:1px solid #212a3a;border-radius:4px"></canvas><div class="note">180</div></div>
</div>
<div class="row" style="justify-content:center;margin-top:12px">
  <button class="btn" style="background:#374151" onclick="dl('c16','favicon-16.png')">16px</button>
  <button class="btn" style="background:#374151" onclick="dl('c32','favicon-32.png')">32px</button>
  <button class="btn" style="background:#374151" onclick="dl('c48','favicon-48.png')">48px</button>
  <button class="btn" style="background:#374151" onclick="dl('c180','apple-touch-icon.png')">180px</button>
</div></section>
<script>
function gen(){const t=document.getElementById('txt').value||'A',bg=document.getElementById('bg').value,fg=document.getElementById('fg').value;[16,32,48,180].forEach(s=>{const c=document.getElementById('c'+s),x=c.getContext('2d');c.width=s;c.height=s;x.fillStyle=bg;x.beginPath();x.arc(s/2,s/2,s/2,0,Math.PI*2);x.fill();x.fillStyle=fg;x.font='bold '+(s*0.6)+'px Arial';x.textAlign='center';x.textBaseline='middle';x.fillText(t,s/2,s/2);});}
function dl(id,name){const a=document.createElement('a');a.download=name;a.href=document.getElementById(id).toDataURL('image/png');a.click();}
</script>
