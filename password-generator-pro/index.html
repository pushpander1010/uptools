    <p class="note" style="margin-bottom:16px">Generate cryptographically secure passwords with options.</p>

<section class="tool-card">
  <div style="font-size:1.5rem;font-weight:700;color:#6366f1;word-break:break-all;padding:16px;background:#0e1628;border-radius:.5rem;text-align:center;font-family:monospace" id="pw">Click Generate</div>
  <div class="row" style="margin-top:12px;justify-content:center"><button class="btn" onclick="gen()">Generate</button><button class="btn" style="background:#374151" onclick="navigator.clipboard.writeText(document.getElementById('pw').textContent)">Copy</button></div>
  <div style="margin-top:12px"><label class="note">Length: <span id="lv">16</span></label><input type="range" id="len" min="8" max="64" value="16" style="width:100%" oninput="document.getElementById('lv').textContent=this.value;gen()"></div>
  <div class="grid" style="grid-template-columns:repeat(auto-fill,minmax(140px,1fr))">
    <label style="color:#9aa4b2"><input type="checkbox" id="u" checked onchange="gen()"> Uppercase</label>
    <label style="color:#9aa4b2"><input type="checkbox" id="l" checked onchange="gen()"> Lowercase</label>
    <label style="color:#9aa4b2"><input type="checkbox" id="n" checked onchange="gen()"> Numbers</label>
    <label style="color:#9aa4b2"><input type="checkbox" id="s" checked onchange="gen()"> Symbols</label>
  </div>
</section>
<section class="tool-card"><h2 style="margin-top:0">Bulk Generate</h2><div class="row"><input class="input" id="bc" type="number" value="10" min="1" max="100" style="width:80px"><button class="btn" onclick="bulk()">Generate Multiple</button><button class="btn" style="background:#374151" onclick="navigator.clipboard.writeText(document.getElementById('bo').textContent)">Copy All</button></div><div class="output-box" id="bo" style="min-height:80px;margin-top:8px;font-family:monospace;font-size:.9rem"></div></section>
<script>
const C={u:'ABCDEFGHIJKLMNOPQRSTUVWXYZ',l:'abcdefghijklmnopqrstuvwxyz',n:'0123456789',s:'!@#$%^&*()_+-='};
function gen(){let cs='';if(document.getElementById('u').checked)cs+=C.u;if(document.getElementById('l').checked)cs+=C.l;if(document.getElementById('n').checked)cs+=C.n;if(document.getElementById('s').checked)cs+=C.s;if(!cs)cs=C.l;let pw='';const a=new Uint32Array(+document.getElementById('len').value);crypto.getRandomValues(a);for(let i=0;i<a.length;i++)pw+=cs[a[i]%cs.length];document.getElementById('pw').textContent=pw;}
function bulk(){let cs='';if(document.getElementById('u').checked)cs+=C.u;if(document.getElementById('l').checked)cs+=C.l;if(document.getElementById('n').checked)cs+=C.n;if(document.getElementById('s').checked)cs+=C.s;if(!cs)cs=C.l;const cnt=+document.getElementById('bc').value||10;let r=[];for(let i=0;i<cnt;i++){let pw='';const a=new Uint32Array(+document.getElementById('len').value);crypto.getRandomValues(a);for(let j=0;j<a.length;j++)pw+=cs[a[j]%cs.length];r.push(pw);}document.getElementById('bo').textContent=r.join('\n');}
gen();
</script>
