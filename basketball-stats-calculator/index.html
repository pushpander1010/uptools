<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Basketball Stats Calculator - Player Performance & Shooting Stats | UpTools</title>
  <link rel="icon" sizes="50x50" type="image/svg+xml" href="/assets/logo/uptools-logo.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/logo/uptools-logo.svg">
  <meta name="description" content="Free Basketball Stats Calculator by UpTools. Calculate shooting percentages, PER, efficiency rating, and player performance metrics." />

  <meta name="keywords" content="basketball stats calculator, shooting percentage, player efficiency rating, per, basketball metrics, nba stats" />
  <link rel="canonical" href="https://www.uptools.in/basketball-stats-calculator/" />
  <meta property="og:title" content="Basketball Stats Calculator - Player Performance & Shooting Stats | UpTools" />
  <meta property="og:description" content="Free Basketball Stats Calculator by UpTools. Calculate shooting percentages and player efficiency metrics." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.uptools.in/basketball-stats-calculator/" />
  <meta property="og:site_name" content="UpTools" />
  <meta property="og:image" content="/assets/og/basketball-stats-calculator.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preload" href="/style.css?v=1.3.0" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="/style.css?v=1.3.0"></noscript>
  <style>
    :root{
      --bg1:#0a0b0f;
      --bg2:#0b0f1a;
      --ink:#e9ecf5;
      --muted:#a6adbb;
      --accent:#ff6b35;
      --accent-2:#ff8c42;
      --line:rgba(255,255,255,.10);
      --card:rgba(255,255,255,.04);
    }
    html,body{height:100%}
    body{
      color:var(--ink);
      background:
        radial-gradient(1200px 800px at 10% 5%, rgba(255,107,53,.08), transparent 55%),
        radial-gradient(900px 600px at 88% 10%, rgba(255,140,66,.06), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .wrap{ max-width:1100px; margin:0 auto; padding:24px 16px 32px; display:grid; gap:16px; }
    .grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:16px; align-items:start; }
    @media (max-width:900px){ .grid{ grid-template-columns:1fr; } }
    .card{ border:1px solid var(--line); border-radius:14px; background:var(--card); padding:1rem; }
    .tool-header{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .tool-icon{
      width:48px;height:48px;border-radius:12px;display:grid;place-items:center;font-size:24px;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 8px 24px rgba(255,107,53,.3);
    }
    h1{margin:0;font-size:1.75rem;text-shadow:0 0 10px rgba(255,107,53,.4);}
    .inputs{ display:grid; gap:12px; }
    .row{display:flex;flex-direction:column;gap:6px;}
    .label{font-weight:600;color:var(--muted);font-size:.9rem;}
    .input{
      padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.3);
      color:var(--ink);font-size:1rem;font-family:inherit;
      transition:border-color .2s,box-shadow .2s;
    }
    .input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.15);}
    .btn{
      padding:12px 20px;border-radius:10px;border:1px solid var(--accent);
      background:linear-gradient(135deg, rgba(255,107,53,.2), rgba(255,140,66,.15));
      color:var(--accent);font-weight:700;cursor:pointer;font-size:1rem;
      transition:transform .1s,filter .15s;
    }
    .btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
    .result{ display:grid; gap:10px; }
    .result .row{
      display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
      border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.25);
    }
    .amount{font-variant-numeric:tabular-nums;font-weight:800;font-size:1.2rem;color:var(--accent);}
    .note{color:var(--muted);font-size:.9rem;margin-top:8px;}
  </style>
</head>
<body>
  <a href="#main" class="sr-only">Skip to content</a>
  <main class="wrap" id="main" role="main">
    <div class="grid">
      <div>
        <div class="card">
          <div class="tool-header">
            <div class="tool-icon">🏀</div>
            <div>
              <h1>Basketball Stats Calculator</h1>
              <p class="note" style="margin:0">Calculate shooting & efficiency metrics</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="inputs">
            <div class="row">
              <label class="label">Field Goals Made</label>
              <input class="input" type="number" id="fgm" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Field Goals Attempted</label>
              <input class="input" type="number" id="fga" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">3-Pointers Made</label>
              <input class="input" type="number" id="threepm" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Free Throws Made</label>
              <input class="input" type="number" id="ftm" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Free Throws Attempted</label>
              <input class="input" type="number" id="fta" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Rebounds</label>
              <input class="input" type="number" id="reb" placeholder="0" min="0" />
            </div>
            <div class="row">
              <label class="label">Assists</label>
              <input class="input" type="number" id="ast" placeholder="0" min="0" />
            </div>
            <button class="btn" onclick="calculateStats()">Calculate</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="result" id="result" style="display:none;">
          <h3 style="margin:0 0 12px 0;color:var(--accent);">Performance Metrics</h3>
          <div id="resultContent"></div>
        </div>
        <div id="noResult" style="color:var(--muted);text-align:center;padding:20px;">
          Enter stats to calculate metrics
        </div>
      </div>
    </div>
  </main>
  <script src="/scripts/utils.js?v=1.3.0" type="module"></script>
  <script defer>
    function calculateStats() {
      const fgm = parseInt(document.getElementById('fgm').value) || 0;
      const fga = parseInt(document.getElementById('fga').value) || 0;
      const threepm = parseInt(document.getElementById('threepm').value) || 0;
      const ftm = parseInt(document.getElementById('ftm').value) || 0;
      const fta = parseInt(document.getElementById('fta').value) || 0;
      const reb = parseInt(document.getElementById('reb').value) || 0;
      const ast = parseInt(document.getElementById('ast').value) || 0;

      if (fga === 0) {
        alert('Please enter field goals attempted');
        return;
      }

      const fgPct = ((fgm / fga) * 100).toFixed(1);
      const threePct = fga > 0 ? ((threepm / (fga - fgm + threepm)) * 100).toFixed(1) : 0;
      const ftPct = fta > 0 ? ((ftm / fta) * 100).toFixed(1) : 0;
      const ts = ((fgm + 0.44 * ftm) / (2 * (fga + 0.44 * fta)) * 100).toFixed(1);
      const points = fgm * 2 - threepm + ftm;

      const resultContent = document.getElementById('resultContent');
      resultContent.innerHTML = `
        <div class="row"><span>FG%</span><span class="amount">${fgPct}%</span></div>
        <div class="row"><span>3P%</span><span class="amount">${threePct}%</span></div>
        <div class="row"><span>FT%</span><span class="amount">${ftPct}%</span></div>
        <div class="row"><span>True Shooting %</span><span class="amount">${ts}%</span></div>
        <div class="row"><span>Points</span><span class="amount">${points}</span></div>
        <div class="row"><span>Rebounds</span><span class="amount">${reb}</span></div>
        <div class="row"><span>Assists</span><span class="amount">${ast}</span></div>
      `;

      document.getElementById('result').style.display = 'block';
      document.getElementById('noResult').style.display = 'none';
    }

    document.getElementById('fga').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') calculateStats();
    });
  </script>
</body>
</html>
