  <style>
    :root{
      --bg1:#0a0b0f;
      --bg2:#0b0f1a;
      --ink:#e9ecf5;
      --muted:#a6adbb;
      --accent:#ff6b35;
      --accent-2:#ff8c42;
      --line:rgba(255,255,255,.10);
      --card:rgba(255,255,255,.04);
    }
    html,body{height:100%}
    body{
      color:var(--ink);
      background:
        radial-gradient(1200px 800px at 10% 5%, rgba(255,107,53,.08), transparent 55%),
        radial-gradient(900px 600px at 88% 10%, rgba(255,140,66,.06), transparent 55%),
        linear-gradient(180deg, var(--bg1), var(--bg2));
    }
    .wrap{ max-width:1100px; margin:0 auto; padding:24px 16px 32px; display:grid; gap:16px; }
    .grid{ display:grid; grid-template-columns:1.1fr .9fr; gap:16px; align-items:start; }
    @media (max-width:900px){ .grid{ grid-template-columns:1fr; } }
    .card{ border:1px solid var(--line); border-radius:14px; background:var(--card); padding:1rem; }
    .tool-header{ display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .tool-icon{
      width:48px;height:48px;border-radius:12px;display:grid;place-items:center;font-size:24px;
      background:linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow:0 8px 24px rgba(255,107,53,.3);
    }
    h1{margin:0;font-size:1.75rem;text-shadow:0 0 10px rgba(255,107,53,.4);}
    .inputs{ display:grid; gap:12px; }
    .row{display:flex;flex-direction:column;gap:6px;}
    .label{font-weight:600;color:var(--muted);font-size:.9rem;}
    .input, .select{
      padding:12px 14px;border-radius:10px;border:1px solid var(--line);background:rgba(0,0,0,.3);
      color:var(--ink);font-size:1rem;font-family:inherit;
      transition:border-color .2s,box-shadow .2s;
    }
    .input:focus, .select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,107,53,.15);}
    .select{cursor:pointer;}
    .btn{
      padding:12px 20px;border-radius:10px;border:1px solid var(--accent);
      background:linear-gradient(135deg, rgba(255,107,53,.2), rgba(255,140,66,.15));
      color:var(--accent);font-weight:700;cursor:pointer;font-size:1rem;
      transition:transform .1s,filter .15s;
    }
    .btn:hover{filter:brightness(1.15);transform:translateY(-1px);}
    .result{ display:grid; gap:10px; }
    .result .row{
      display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
      border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.25);
    }
    .amount{font-variant-numeric:tabular-nums;font-weight:800;font-size:1.2rem;color:var(--accent);}
    .note{color:var(--muted);font-size:.9rem;margin-top:8px;}
  </style>
</head>
<body>

  <main class="wrap" id="main" role="main">
    <div class="grid">
      <div>
        <div class="card">
          <div class="tool-header">
            <div class="tool-icon">⚽</div>
            <div>
              <h1>Sports Score Converter</h1>
              <p class="note" style="margin:0">Convert scores between sports</p>
            </div>
          </div>
        </div>
        <div class="card">
          <div class="inputs">
            <div class="row">
              <label class="label">Sport</label>
              <select class="select" id="sport">
                <option value="basketball">Basketball</option>
                <option value="football">American Football</option>
                <option value="soccer">Soccer/Football</option>
                <option value="tennis">Tennis</option>
                <option value="baseball">Baseball</option>
                <option value="hockey">Ice Hockey</option>
              </select>
            </div>
            <div class="row">
              <label class="label">Score</label>
              <input class="input" type="number" id="score" placeholder="Enter score" min="0" />
            </div>
            <button class="btn" onclick="convertScore()">Convert</button>
          </div>
        </div>
      </div>
      <div class="card">
        <div class="result" id="result" style="display:none;">
          <h3 style="margin:0 0 12px 0;color:var(--accent);">Conversion Results</h3>
          <div id="resultContent"></div>
        </div>
        <div id="noResult" style="color:var(--muted);text-align:center;padding:20px;">
          Enter a score and select a sport to see conversions
        </div>
      </div>
    </div>
  </main>

  <footer class="note small site-footer" role="contentinfo">
    © <span id="y"></span> UpTools . <a href="/about/">About</a> . <a href="/contact/">Contact</a> . <a href="/sitemap.xml">Sitemap</a> . <a href="/privacy-policy/">Privacy Policy</a>
  </footer>

  <script defer>
    document.getElementById('y').textContent = new Date().getFullYear();
    const conversions = {
      basketball: {
        name: 'Basketball',
        points: [1, 2, 3],
        descriptions: ['Free Throw', 'Field Goal', 'Three-Pointer']
      },
      football: {
        name: 'American Football',
        points: [3, 6, 7, 8, 2],
        descriptions: ['Field Goal', 'Touchdown', 'Touchdown + Extra Point', 'Touchdown + 2-Point Conversion', 'Safety']
      },
      soccer: {
        name: 'Soccer/Football',
        points: [1, 3],
        descriptions: ['Goal', 'Win (3 pts)']
      },
      tennis: {
        name: 'Tennis',
        points: [1, 4, 6],
        descriptions: ['Point', 'Game', 'Set']
      },
      baseball: {
        name: 'Baseball',
        points: [1, 2, 3, 4],
        descriptions: ['Single', 'Double', 'Triple', 'Home Run']
      },
      hockey: {
        name: 'Ice Hockey',
        points: [1, 2, 3],
        descriptions: ['Goal', 'Assist', 'Win (2 pts)']
      }
    };

    function convertScore() {
      const sport = document.getElementById('sport').value;
      const score = parseInt(document.getElementById('score').value);
      
      if (isNaN(score) || score < 0) {
        alert('Please enter a valid score');
        return;
      }

      const sportData = conversions[sport];
      const resultContent = document.getElementById('resultContent');
      let html = '';

      sportData.points.forEach((point, idx) => {
        const count = Math.floor(score / point);
        if (count > 0) {
          html += `<div class="row"><span>${sportData.descriptions[idx]}</span><span class="amount">${count}</span></div>`;
        }
      });

      resultContent.innerHTML = html || '<p class="note">No conversions available for this score</p>';
      document.getElementById('result').style.display = 'block';
      document.getElementById('noResult').style.display = 'none';
    }

    document.getElementById('score').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') convertScore();
    });
  </script>
