<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="x-ua-compatible" content="IE=edge" />
  <title>CBSE Percentage Calculator | UpTools</title>
  <meta name="description" content="Calculate CBSE Class 12 percentage from subject-wise marks with instant totals, average, and grade insight." />
  <meta name="robots" content="index,follow,max-snippet:-1,max-image-preview:large,max-video-preview:large" />
  <link rel="canonical" href="https://www.uptools.in/cbse-percentage-calculator/" />
  <link rel="icon" sizes="50x50" type="image/svg+xml" href="/assets/logo/uptools-logo.svg" />
  <style>
    :root{--bg:#0f1419;--surface:#121826;--text:#e6edf3;--muted:#9aa4b2;--brand:#7aa2ff;--border:#212a3a;--radius:.75rem}
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font:400 16px/1.6 system-ui,sans-serif} a{color:var(--brand)}
    .container{width:min(100% - 24px,980px);margin:auto;padding:20px 0 32px}.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1rem}
    .grid{display:grid;gap:12px}.row{display:flex;gap:12px;flex-wrap:wrap}.subject{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:10px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.08)}
    .subject:last-child{border-bottom:0}.input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);background:#0b1224;color:var(--text)} .btn{padding:.65rem .95rem;border-radius:var(--radius);border:0;background:var(--brand);color:#0b1020;font-weight:700;cursor:pointer}
    .btn.secondary{background:transparent;color:var(--text);border:1px solid var(--border)} .muted{color:var(--muted)} .site-footer{margin-top:24px;padding-top:12px;border-top:1px solid var(--border);text-align:center}
    @media (max-width:640px){.subject{grid-template-columns:1fr}}
  </style>
  <link rel="preload" href="/style.css?v=1.2.0" as="style" />
  <link rel="stylesheet" href="/style.css?v=1.2.0" media="print" onload="this.media='all'" />
  <meta property="og:title" content="CBSE Percentage Calculator | UpTools" />
  <meta property="og:description" content="Calculate CBSE Class 12 percentage from subject-wise marks with instant totals, average, and grade insight." />
  <meta property="og:url" content="https://www.uptools.in/cbse-percentage-calculator/" />
  <meta property="og:type" content="website" />
</head>
<body>
  <main class="container">
    <nav class="muted" style="margin-bottom:8px"><a href="/">Home</a> &rsaquo; <span>CBSE Percentage Calculator</span></nav>
    <section class="card">
      <h1 style="margin-top:0">CBSE Percentage Calculator</h1>
      <p class="muted">Enter subject-wise marks from your marksheet. Empty rows are ignored.</p>
      <div id="form"></div>
      <div class="row" style="margin-top:12px">
        <button id="calcBtn" class="btn" type="button">Calculate</button>
        <button id="demoBtn" class="btn secondary" type="button">Demo</button>
        <button id="resetBtn" class="btn secondary" type="button">Reset</button>
      </div>
    </section>
    <section id="result" class="card" style="display:none;margin-top:12px"></section>
    <section class="card" style="margin-top:12px">
      <h2 style="margin-top:0">Related Tools</h2>
      <ul>
        <li><a href="/cbse-class-12-result/">CBSE Class 12 Result Checker</a></li>
        <li><a href="/best-of-five-calculator/">Best of Five Calculator</a></li>
        <li><a href="/college-course-finder/">College Course Finder</a></li>
      </ul>
    </section>
    <footer class="muted site-footer">&copy; <span id="y"></span> UpTools</footer>
  </main>
  <script type="module">
    import { $, setText } from '/scripts/utils.js';
    setText($('#y'), new Date().getFullYear());
    const seed = [['English', '', 100], ['Physics', '', 100], ['Chemistry', '', 100], ['Mathematics', '', 100], ['Computer Science', '', 100], ['Physical Education', '', 100]];
    function grade(p){if(p>=91)return'A1';if(p>=81)return'A2';if(p>=71)return'B1';if(p>=61)return'B2';if(p>=51)return'C1';if(p>=41)return'C2';if(p>=33)return'D';return'E'}
    function render(rows=seed){$('#form').innerHTML=rows.map(r=>`<div class="subject"><input class="input sname" value="${r[0]}"><input class="input smarks" type="number" min="0" value="${r[1]}"><input class="input smax" type="number" min="1" value="${r[2]}"></div>`).join('')}
    function read(){return [...document.querySelectorAll('.subject')].map((_,i)=>({name:[...document.querySelectorAll('.sname')][i].value.trim(),marks:Number([...document.querySelectorAll('.smarks')][i].value),max:Number([...document.querySelectorAll('.smax')][i].value)})).filter(r=>r.name||Number.isFinite(r.marks))}
    $('#calcBtn').addEventListener('click',()=>{const rows=read().filter(r=>r.name&&Number.isFinite(r.marks)&&Number.isFinite(r.max)&&r.max>0&&r.marks>=0&&r.marks<=r.max); if(!rows.length){alert('Enter at least one valid subject.');return} const total=rows.reduce((a,b)=>a+b.marks,0); const max=rows.reduce((a,b)=>a+b.max,0); const pct=(total/max)*100; $('#result').style.display='block'; $('#result').innerHTML=`<h2 style="margin-top:0">Result</h2><p><strong>Total:</strong> ${total}/${max}</p><p><strong>Percentage:</strong> ${pct.toFixed(2)}%</p><p><strong>Average per subject:</strong> ${(total/rows.length).toFixed(2)}</p><p><strong>Overall grade band:</strong> ${grade(pct)}</p><div class="grid">${rows.map(r=>`<p><strong>${r.name}:</strong> ${r.marks}/${r.max} (${((r.marks/r.max)*100).toFixed(1)}%) - ${grade((r.marks/r.max)*100)}</p>`).join('')}</div>`})
    $('#demoBtn').addEventListener('click',()=>render([['English Core',88,100],['Physics',84,100],['Chemistry',79,100],['Mathematics',91,100],['Computer Science',95,100],['Physical Education',93,100]]))
    $('#resetBtn').addEventListener('click',()=>{$('#result').style.display='none';render()})
    render();
  </script>
</body>
</html>
