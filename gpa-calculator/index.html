  <style>
    :root{--accent:#a78bfa;--accent-2:#22d3ee;}

    .sem-title{font-weight:800;font-size:1rem;flex:1;}
    .sem-gpa-badge{padding:.25rem .7rem;border-radius:20px;font-weight:900;font-size:.9rem;background:rgba(167,139,250,.15);color:var(--accent);border:1px solid var(--accent);}
    .course-row{display:grid;grid-template-columns:1fr auto auto auto;gap:.4rem;align-items:center;margin-bottom:.4rem;}
    .course-row input,select{padding:.45rem .6rem;border-radius:8px;background:#0a1224;border:1px solid var(--border);color:var(--text);font:inherit;width:100%;}
    .course-row input:focus,select:focus{border-color:var(--accent);outline:none;}
    .icon-btn{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1.1rem;padding:.3rem;line-height:1;transition:color .15s;}
    .icon-btn:hover{color:#ff6b6b;}
    .add-course-btn{display:flex;align-items:center;gap:.4rem;padding:.4rem .8rem;border-radius:8px;border:1px dashed var(--border);background:none;color:var(--muted);cursor:pointer;font:inherit;font-size:.85rem;transition:all .15s;margin-top:.4rem;}
    .add-course-btn:hover{border-color:var(--accent);color:var(--accent);}
    /* Summary */
    .summary-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:.75rem;margin-bottom:1.25rem;}
    .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;text-align:center;box-shadow:var(--glow-soft);}
    .kpi .val{font-size:2rem;font-weight:900;color:var(--accent);line-height:1;}
    .kpi .lbl{font-size:.78rem;color:var(--muted);margin-top:.3rem;}
    .gpa-bar{height:10px;border-radius:99px;background:#1a2030;margin:.5rem 0;overflow:hidden;}
    .gpa-bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--accent),var(--accent-2));transition:width .5s cubic-bezier(.4,0,.2,1);}
    .actions-row{display:flex;flex-wrap:wrap;gap:.5rem;margin-bottom:1rem;}
    @media(max-width:500px){.course-row{grid-template-columns:1fr 80px 70px auto;}}
    .grade-color-good{color:#4ade80;}
    .grade-color-ok{color:#fbbf24;}
    .grade-color-bad{color:#f87171;}

<script>(adsbygoogle=window.adsbygoogle||[]).push({});</script>

<main class="wrap">
  <div class="tool-hero">
    <h1>🎓 GPA Calculator</h1>
    <p>Weighted (5.0) &amp; Unweighted (4.0) · Multi-semester · Cumulative GPA</p>
  </div>

  <div class="scale-toggle" role="group" aria-label="Scale">
    <button class="scale-btn active" id="unweightedBtn" onclick="setScale('unweighted')">Unweighted (4.0)</button>
    <button class="scale-btn" id="weightedBtn" onclick="setScale('weighted')">Weighted (5.0)</button>
  </div>

  <div class="summary-grid">
    <div class="kpi">
      <div class="val" id="cumGPA">—</div>
      <div class="lbl">Cumulative GPA</div>
      <div class="gpa-bar"><div class="gpa-bar-fill" id="cumBar" style="width:0%"></div></div>
    </div>
    <div class="kpi">
      <div class="val" id="totCredits">0</div>
      <div class="lbl">Total Credits</div>
    </div>
    <div class="kpi">
      <div class="val" id="totCourses">0</div>
      <div class="lbl">Total Courses</div>
    </div>
    <div class="kpi">
      <div class="val" id="totSemesters">0</div>
      <div class="lbl">Semesters</div>
    </div>
  </div>

  <div class="actions-row">
    <button class="btn" onclick="addSemester()">+ Add Semester</button>
    <button class="btn" style="background:var(--card);color:var(--text);border:1px solid var(--border);" onclick="clearAll()">🗑 Clear All</button>
  </div>

  <div id="semesterContainer"></div>
</main>

<footer style="text-align:center;padding:2rem 1rem;color:var(--muted);font-size:.85rem;">
  <nav style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-bottom:.5rem;">
    <a href="/" style="color:var(--accent);text-decoration:none">UpTools</a>
    <a href="/#tools" style="color:var(--accent);text-decoration:none">All Tools</a>
    <a href="/games/" style="color:var(--accent);text-decoration:none">Games</a>
    <a href="/about/" style="color:var(--accent);text-decoration:none">About</a>
  </nav>
  <div>© 2025 UpTools · Free tools for everyone.</div>
</footer>

<script>
const GRADES_UW={
  'A+':4.0,'A':4.0,'A-':3.7,'B+':3.3,'B':3.0,'B-':2.7,
  'C+':2.3,'C':2.0,'C-':1.7,'D+':1.3,'D':1.0,'D-':0.7,'F':0.0
};
const GRADES_W={
  'A+':5.0,'A':5.0,'A-':4.7,'B+':4.3,'B':4.0,'B-':3.7,
  'C+':3.3,'C':3.0,'C-':2.7,'D+':2.3,'D':2.0,'D-':1.7,'F':0.0
};
let scale='unweighted';
let semesters=[];
let semId=0;

function setScale(s){
  scale=s;
  document.getElementById('unweightedBtn').classList.toggle('active',s==='unweighted');
  document.getElementById('weightedBtn').classList.toggle('active',s==='weighted');
  render();save();
}

function gradePoints(letter){
  const map=scale==='weighted'?GRADES_W:GRADES_UW;
  return map[letter]??0;
}

function gradeOptions(selected='A'){
  const grades=Object.keys(GRADES_UW);
  return grades.map(g=>`<option value="${g}"${g===selected?' selected':''}>${g}</option>`).join('');
}

function addSemester(name,courses){
  const id=++semId;
  semesters.push({id,name:name||`Semester ${semesters.length+1}`,courses:courses||[{name:'',credits:3,grade:'A'}]});
  render();save();
}

function removeSemester(id){
  semesters=semesters.filter(s=>s.id!==id);
  render();save();
}

function addCourse(semId){
  const s=semesters.find(x=>x.id===semId);
  if(s) s.courses.push({name:'',credits:3,grade:'A'});
  render();save();
}

function removeCourse(semId,idx){
  const s=semesters.find(x=>x.id===semId);
  if(s){s.courses.splice(idx,1);if(!s.courses.length)s.courses.push({name:'',credits:3,grade:'A'});}
  render();save();
}

function collectFromDOM(){
  semesters.forEach(s=>{
    const el=document.getElementById('sem-'+s.id);
    if(!el)return;
    s.name=el.querySelector('.sem-name-input').value||s.name;
    s.courses=[];
    el.querySelectorAll('.course-entry').forEach(row=>{
      s.courses.push({
        name:row.querySelector('.c-name').value,
        credits:parseFloat(row.querySelector('.c-credits').value)||3,
        grade:row.querySelector('.c-grade').value
      });
    });
  });
}

function calcSemGPA(courses){
  let pts=0,creds=0;
  courses.forEach(c=>{const cr=parseFloat(c.credits)||0;pts+=gradePoints(c.grade)*cr;creds+=cr;});
  return creds?pts/creds:null;
}

function render(){
  const container=document.getElementById('semesterContainer');
  container.innerHTML='';
  let totalPts=0,totalCreds=0,totalCourses=0;

  semesters.forEach(s=>{
    const gpa=calcSemGPA(s.courses);
    const gpaStr=gpa!==null?gpa.toFixed(2):'—';
    const gpaColor=gpa===null?'':(gpa>=3.5?'grade-color-good':gpa>=2.5?'grade-color-ok':'grade-color-bad');
    s.courses.forEach(c=>{const cr=parseFloat(c.credits)||0;totalPts+=gradePoints(c.grade)*cr;totalCreds+=cr;totalCourses++;});

    const div=document.createElement('div');
    div.className='semester';div.id='sem-'+s.id;
    div.innerHTML=`
      <div class="sem-header">
        <input class="sem-name-input input" style="max-width:180px;font-weight:800;" value="${s.name}" oninput="save()"/>
        <span class="sem-gpa-badge ${gpaColor}">GPA: ${gpaStr}</span>
        <button class="icon-btn" title="Remove semester" onclick="removeSemester(${s.id})">🗑</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 80px 80px 32px;gap:.35rem;margin-bottom:.3rem;font-size:.75rem;color:var(--muted);font-weight:700;">
        <span>Course Name</span><span style="text-align:center;">Credits</span><span style="text-align:center;">Grade</span><span></span>
      </div>
      ${s.courses.map((c,i)=>`
        <div class="course-entry" style="display:grid;grid-template-columns:1fr 80px 80px 32px;gap:.35rem;margin-bottom:.35rem;align-items:center;">
          <input class="c-name input" placeholder="e.g. Math 101" value="${c.name}" style="font-size:.85rem;" oninput="save()"/>
          <input class="c-credits input" type="number" min="0.5" max="6" step="0.5" value="${c.credits}" style="text-align:center;font-size:.85rem;" onchange="save();renderSummary()"/>
          <select class="c-grade" onchange="save();renderSummary()">${gradeOptions(c.grade)}</select>
          <button class="icon-btn" onclick="removeCourse(${s.id},${i})">✕</button>
        </div>`).join('')}
      <button class="add-course-btn" onclick="addCourse(${s.id})">＋ Add Course</button>
    `;
    container.appendChild(div);
  });

  const cumGPA=totalCreds?totalPts/totalCreds:null;
  const cumStr=cumGPA!==null?cumGPA.toFixed(2):'—';
  const maxScale=scale==='weighted'?5:4;
  const pct=cumGPA!==null?(cumGPA/maxScale*100).toFixed(1):0;
  const cumColor=cumGPA===null?'':(cumGPA>=3.5?'grade-color-good':cumGPA>=2.5?'grade-color-ok':'grade-color-bad');
  document.getElementById('cumGPA').textContent=cumStr;
  document.getElementById('cumGPA').className='val '+cumColor;
  document.getElementById('cumBar').style.width=pct+'%';
  document.getElementById('totCredits').textContent=totalCreds.toFixed(1);
  document.getElementById('totCourses').textContent=totalCourses;
  document.getElementById('totSemesters').textContent=semesters.length;
}

function renderSummary(){
  collectFromDOM();render();
}

function save(){
  collectFromDOM();
  localStorage.setItem('gpa-calc',JSON.stringify({scale,semesters,semId}));
}

function load(){
  try{
    const d=JSON.parse(localStorage.getItem('gpa-calc'));
    if(d){scale=d.scale||'unweighted';semesters=d.semesters||[];semId=d.semId||0;}
  }catch{}
  document.getElementById('unweightedBtn').classList.toggle('active',scale==='unweighted');
  document.getElementById('weightedBtn').classList.toggle('active',scale==='weighted');
  render();
}

function clearAll(){
  if(confirm('Clear all semesters?')){semesters=[];semId=0;save();render();}
}

// Mobile menu
document.querySelector('.mobile-menu-toggle')?.addEventListener('click',function(){
  const nav=document.querySelector('.nav-links');
  const open=nav.classList.toggle('active');
  this.setAttribute('aria-expanded',open);
});

load();
if(!semesters.length){addSemester('Semester 1',[{name:'',credits:3,grade:'A'},{name:'',credits:3,grade:'B+'}]);}
</script>
</body>
