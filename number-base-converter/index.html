    <div><label class="note">Number</label><input class="input" id="num" placeholder="1010" style="margin-top:4px;font-family:monospace"></div>

    <div><label class="note">To</label><select class="input" id="to"><option value="2">Binary</option><option value="8">Octal</option><option value="10">Decimal</option><option value="16">Hex</option></select></div>

  <button class="btn" onclick="convert()" style="margin-top:12px">Convert</button>
</section>
<section class="tool-card"><h2 style="margin-top:0">Result</h2><div style="font-size:2rem;font-weight:700;color:#6366f1;font-family:monospace;word-break:break-all" id="res">-</div></section>
<script>
function convert(){try{const n=parseInt(document.getElementById('num').value,parseInt(document.getElementById('from').value));document.getElementById('res').textContent=n.toString(parseInt(document.getElementById('to').value)).toUpperCase();}catch(e){document.getElementById('res').textContent='Error';}}
document.getElementById('num').addEventListener('input',convert);
</script>
