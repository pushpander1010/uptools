  <main class="tool-wrap">
    <h1 style="font-size:1.5rem;margin-bottom:4px">⏱️ Stopwatch & Timer Online</h1>
    <p class="note" style="margin-bottom:16px">Free online stopwatch with lap tracking and countdown timer.</p>

<section class="tool-card" style="text-align:center">
  <div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px">
    <button class="btn" style="background:#6366f1" id="swTab" onclick="showTab('sw')">Stopwatch</button>
    <button class="btn" style="background:#374151" id="tmTab" onclick="showTab('tm')">Timer</button>
  </div>
  <div id="sw">
    <div style="font-size:3.5rem;font-weight:700;color:#6366f1;font-variant-numeric:tabular-nums" id="swDisp">00:00:00.000</div>
    <div class="row" style="justify-content:center"><button class="btn" id="swStart" onclick="swToggle()">▶️ Start</button><button class="btn" style="background:#374151" onclick="swLap()">📍 Lap</button><button class="btn" style="background:#374151" onclick="swReset()">Reset</button></div>
    <div id="laps" style="margin-top:12px;max-height:200px;overflow-y:auto"></div>
  </div>
  <div id="tm" style="display:none">
    <div style="display:flex;justify-content:center;gap:8px;margin-bottom:16px">
      <input class="input" id="tH" type="number" value="0" min="0" max="23" style="width:60px;text-align:center">
      <span style="color:#9aa4b2;font-size:1.5rem">:</span>
      <input class="input" id="tM" type="number" value="5" min="0" max="59" style="width:60px;text-align:center">
      <span style="color:#9aa4b2;font-size:1.5rem">:</span>
      <input class="input" id="tS" type="number" value="0" min="0" max="59" style="width:60px;text-align:center">
    </div>
    <div style="font-size:3.5rem;font-weight:700;color:#6366f1;font-variant-numeric:tabular-nums" id="tmDisp">00:05:00</div>
    <div class="row" style="justify-content:center"><button class="btn" id="tmStart" onclick="tmToggle()">▶️ Start</button><button class="btn" style="background:#374151" onclick="tmReset()">Reset</button></div>
  </div>
</section>
<script>
let swT=0,swI,swR=false,swL=[],tmT=300,tmI,tmR=false;
function fmtSW(ms){const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000),ms2=ms%1000;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+'.'+String(ms2).padStart(3,'0');}
function fmtTM(s){return String(Math.floor(s/3600)).padStart(2,'0')+':'+String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function showTab(t){document.getElementById('sw').style.display=t==='sw'?'block':'none';document.getElementById('tm').style.display=t==='tm'?'block':'none';document.getElementById('swTab').style.background=t==='sw'?'#6366f1':'#374151';document.getElementById('tmTab').style.background=t==='tm'?'#6366f1':'#374151';}
function swToggle(){if(swR){clearInterval(swI);swR=false;document.getElementById('swStart').textContent='▶️ Start';}else{const s=Date.now()-swT;swI=setInterval(()=>{swT=Date.now()-s;document.getElementById('swDisp').textContent=fmtSW(swT);},10);swR=true;document.getElementById('swStart').textContent='⏸️ Pause';}}
function swLap(){if(!swR)return;const d=document.createElement('div');d.style.cssText='padding:4px 8px;background:#0e1628;border-radius:4px;margin-bottom:4px;display:flex;justify-content:space-between';d.innerHTML='<span>Lap '+(swL.length+1)+'</span><span>'+fmtSW(swT)+'</span>';document.getElementById('laps').prepend(d);swL.push(swT);}
function swReset(){clearInterval(swI);swR=false;swT=0;swL=[];document.getElementById('swDisp').textContent=fmtSW(0);document.getElementById('swStart').textContent='▶️ Start';document.getElementById('laps').innerHTML='';}
function tmGet(){return(+document.getElementById('tH').value||0)*3600+(+document.getElementById('tM').value||0)*60+(+document.getElementById('tS').value||0);}
function tmToggle(){if(tmR){clearInterval(tmI);tmR=false;document.getElementById('tmStart').textContent='▶️ Start';}else{if(tmT<=0)tmT=tmGet();tmR=true;document.getElementById('tmStart').textContent='⏸️ Pause';tmI=setInterval(()=>{tmT--;document.getElementById('tmDisp').textContent=fmtTM(tmT);if(tmT<=0){clearInterval(tmI);tmR=false;document.getElementById('tmStart').textContent='▶️ Start';document.getElementById('tmDisp').textContent='00:00:00';}},1000);}}
function tmReset(){clearInterval(tmI);tmR=false;tmT=tmGet();document.getElementById('tmDisp').textContent=fmtTM(tmT);document.getElementById('tmStart').textContent='▶️ Start';}
['tH','tM','tS'].forEach(id=>document.getElementById(id).addEventListener('input',()=>{if(!tmR){tmT=tmGet();document.getElementById('tmDisp').textContent=fmtTM(tmT);}}));
if('Notification' in window&&Notification.permission==='default')Notification.requestPermission();
upd();
</script>
